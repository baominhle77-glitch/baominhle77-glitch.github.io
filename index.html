<style>
  :root{
    --bg:#0d0b14; --bg2:#161226; --card:#1c1730; --card2:#241d3d;
    --ink:#e8e2f4; --ink-dim:#a89fc4; --ink-faint:#6f668f;
    --gold:#d4a94e; --gold-soft:#b8933f;
    --violet:#8b6fd0; --line:#332a52;
    --ok:#5fbf8a; --mid:#d4a94e; --warn:#e0785a;
    --radius:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:Georgia,'Times New Roman',serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, #241d3d55, transparent),
      radial-gradient(900px 500px at -10% 30%, #1c173055, transparent),
      var(--bg);
    color:var(--ink); line-height:1.65; min-height:100vh;
    padding-bottom:70px;
  }
  .wrap{max-width:860px;margin:0 auto;padding:0 16px}

  /* ---------- header ---------- */
  header{padding:34px 0 10px;text-align:center;position:relative}
  .sigil{width:74px;height:74px;margin:0 auto 12px;display:block;opacity:.92}
  h1{font-size:1.55rem;letter-spacing:.14em;color:var(--gold);font-weight:normal;text-transform:uppercase}
  .sub{color:var(--ink-dim);font-size:.95rem;margin-top:6px;font-style:italic}
  .dates{color:var(--ink-faint);font-size:.85rem;letter-spacing:.3em;margin-top:6px}
  .private{display:inline-block;margin-top:12px;font-size:.72rem;color:var(--ink-faint);
    border:1px solid var(--line);border-radius:20px;padding:3px 12px;letter-spacing:.08em}

  /* ---------- search ---------- */
  .searchbox{margin:20px 0 6px;position:relative}
  .searchbox input{
    width:100%;padding:13px 44px 13px 16px;border-radius:12px;
    border:1px solid var(--line);background:var(--bg2);color:var(--ink);
    font-size:1rem;font-family:inherit;outline:none;
  }
  .searchbox input:focus{border-color:var(--violet)}
  .searchbox .icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--ink-faint);font-size:1.05rem;pointer-events:none}
  #searchInfo{font-size:.82rem;color:var(--ink-dim);min-height:1.4em;padding:4px 2px}
  mark{background:#d4a94e55;color:#ffe9b8;border-radius:3px;padding:0 2px}

  /* ---------- tabs ---------- */
  nav{
    position:sticky;top:0;z-index:50;background:#0d0b14ee;backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);margin-top:14px;
  }
  .tabs{display:flex;gap:2px;overflow-x:auto;padding:8px 12px;max-width:860px;margin:0 auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{
    flex:0 0 auto;padding:8px 14px;border-radius:10px;border:1px solid transparent;
    color:var(--ink-dim);font-size:.88rem;cursor:pointer;background:none;font-family:inherit;
    white-space:nowrap;transition:all .15s;
  }
  .tab.active{color:var(--gold);border-color:var(--line);background:var(--card)}

  /* ---------- sections & cards ---------- */
  section{display:none;padding:22px 0 10px;animation:fade .25s ease}
  section.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  h2{color:var(--gold);font-size:1.18rem;font-weight:normal;letter-spacing:.06em;margin:26px 0 12px;text-transform:uppercase}
  h2:first-child{margin-top:0}
  h3{color:var(--violet);font-size:1.02rem;margin:18px 0 8px;font-weight:normal}
  p{margin:0 0 12px;color:var(--ink)}
  .dim{color:var(--ink-dim)}
  .card{
    background:linear-gradient(160deg,var(--card),var(--card2));
    border:1px solid var(--line);border-radius:var(--radius);
    padding:18px 18px 14px;margin-bottom:14px;
  }
  .quote{
    border-left:3px solid var(--gold-soft);padding:10px 14px;margin:12px 0;
    background:#d4a94e0d;border-radius:0 10px 10px 0;font-style:italic;color:#e5d9bd;font-size:.95rem;
  }
  .quote .who{display:block;margin-top:6px;font-size:.8rem;color:var(--ink-faint);font-style:normal}

  /* ---------- badges ---------- */
  .badge{display:inline-block;font-size:.68rem;letter-spacing:.06em;border-radius:6px;padding:2px 8px;vertical-align:2px;margin-left:6px;font-family:system-ui,sans-serif}
  .b-ok{background:#5fbf8a22;color:var(--ok);border:1px solid #5fbf8a55}
  .b-mid{background:#d4a94e22;color:var(--mid);border:1px solid #d4a94e55}
  .b-warn{background:#e0785a22;color:var(--warn);border:1px solid #e0785a55}
  .legend{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 18px}
  .legend .badge{margin-left:0;font-size:.72rem;padding:4px 10px}

  /* ---------- timeline ---------- */
  .tl{position:relative;margin:14px 0 8px;padding-left:26px}
  .tl::before{content:"";position:absolute;left:8px;top:4px;bottom:4px;width:1px;background:linear-gradient(var(--violet),var(--gold-soft),var(--violet))}
  .ev{position:relative;margin-bottom:20px}
  .ev::before{content:"";position:absolute;left:-23px;top:8px;width:9px;height:9px;border-radius:50%;background:var(--bg);border:2px solid var(--gold)}
  .ev .yr{color:var(--gold);font-size:1rem;letter-spacing:.08em}
  .ev .tx{color:var(--ink);font-size:.96rem;margin-top:2px}
  .ev .tx .en{color:var(--ink-dim);font-style:italic}

  /* ---------- myth cards ---------- */
  .verdict{font-family:system-ui,sans-serif;font-size:.75rem;letter-spacing:.1em;padding:3px 10px;border-radius:6px;display:inline-block;margin-bottom:8px}
  .v-false{background:#e0785a22;color:var(--warn);border:1px solid #e0785a66}
  .v-true{background:#5fbf8a22;color:var(--ok);border:1px solid #5fbf8a66}
  .v-partial{background:#d4a94e22;color:var(--mid);border:1px solid #d4a94e66}
  .myth-claim{font-style:italic;color:#efe7ff;font-size:1.02rem;margin-bottom:6px}
  .myth-why{font-size:.92rem;color:var(--ink-dim)}

  /* ---------- steps ---------- */
  .step{display:flex;gap:14px;margin-bottom:14px}
  .step .n{
    flex:0 0 34px;height:34px;border-radius:50%;border:1px solid var(--gold-soft);
    color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:1rem;
  }
  .step .t{flex:1}

  /* ---------- sources ---------- */
  .src{padding:12px 14px;border:1px solid var(--line);border-radius:10px;margin-bottom:10px;background:var(--bg2)}
  .src a{color:#b9a6ea;text-decoration:none;word-break:break-all}
  .src a:hover{text-decoration:underline}
  .src .note{font-size:.85rem;color:var(--ink-dim);margin-top:3px}
  .tier{color:var(--gold);letter-spacing:.12em;font-size:.8rem;text-transform:uppercase;margin:20px 0 10px;font-family:system-ui,sans-serif}

  table{width:100%;border-collapse:collapse;font-size:.92rem;margin:10px 0}
  td,th{padding:8px 10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
  th{color:var(--gold);font-weight:normal;letter-spacing:.05em}

  footer{margin-top:34px;padding:20px 16px 8px;border-top:1px solid var(--line);text-align:center;color:var(--ink-faint);font-size:.8rem}
  .hidden-by-search{display:none !important}

  /* ---------- co che / methods ---------- */
  .fig{margin:14px 0;text-align:center}
  .fig img{max-width:100%;border-radius:10px;border:1px solid var(--line);background:#0a0812;display:block;margin:0 auto}
  .fig.sm img{max-width:180px}
  .fig figcaption{font-size:.76rem;color:var(--ink-faint);margin-top:6px;font-style:italic;line-height:1.4}
  .imglinks{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 4px}
  .imglinks a{font-size:.8rem;color:#b9a6ea;border:1px solid var(--line);border-radius:20px;padding:5px 11px;text-decoration:none;background:var(--bg2)}
  .imglinks a:before{content:"🔍 "}
  .grade{font-family:system-ui,sans-serif;font-size:.7rem;font-weight:bold;padding:3px 9px;border-radius:6px;letter-spacing:.04em;white-space:nowrap}
  .gA{background:#1f7a4a;color:#d9ffe9} .gB{background:#3a6ea5;color:#dcefff}
  .gC{background:#8a6d1f;color:#ffe9b8} .gD{background:#7a3a2f;color:#ffdcc9}
  .layer{border-left:3px solid var(--line);padding:2px 0 2px 14px;margin:12px 0}
  .layer .lh{font-family:system-ui,sans-serif;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;font-weight:bold}
  .l1{border-left-color:var(--violet)} .l1 .lh{color:var(--violet)}
  .l2{border-left-color:var(--ok)} .l2 .lh{color:var(--ok)}
  .l3{border-left-color:var(--gold-soft)} .l3 .lh{color:var(--gold)}
  .method{background:linear-gradient(160deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px}
  .method h3{margin-top:4px;font-size:1.14rem;color:#efe7ff}
  .evbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:2px 0 12px}
  .stat{display:inline-block;background:#5fbf8a14;border:1px solid #5fbf8a44;border-radius:8px;padding:3px 9px;font-size:.82rem;color:#bfe8d2;margin:2px 4px 2px 0;font-family:system-ui,sans-serif}
  /* bilingual evidence quote */
  .evq{border:1px solid var(--line);border-radius:10px;padding:2px 0;margin:14px 0;background:#100e1a;overflow:hidden}
  .evq .q-en{font-style:italic;color:#cdbff0;font-size:.89rem;border-left:3px solid var(--violet);padding:10px 12px;background:#8b6fd00a}
  .evq .q-vi{color:var(--ink);font-size:.93rem;padding:10px 12px;border-left:3px solid var(--ok);background:#5fbf8a08}
  .evq .q-vi b{color:#bfe8d2}
  .evq .q-src{font-size:.76rem;color:var(--ink-faint);padding:7px 12px;font-family:system-ui,sans-serif;border-top:1px dashed var(--line)}
  .evq .q-src a{color:var(--gold);text-decoration:none}
  sup.cite{line-height:0}
  sup.cite a{color:var(--gold);text-decoration:none;font-size:.72em;font-weight:bold;font-family:system-ui,sans-serif;padding:0 1px}

  .refs .rvi{color:var(--ink-faint);font-style:italic}
  /* effect-size chart */
  .chart{margin:10px 0}
  .chart .bar-row{display:flex;align-items:center;gap:8px;margin:7px 0;font-family:system-ui,sans-serif}
  .chart .bar-lab{flex:0 0 42%;font-size:.8rem;color:var(--ink-dim);text-align:right}
  .chart .bar-wrap{flex:1;background:#1a1530;border-radius:5px;height:20px;position:relative;overflow:hidden}
  .chart .bar-fill{height:100%;border-radius:5px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:.72rem;color:#0d0b14;font-weight:bold}
  .chart .scale{display:flex;justify-content:space-between;font-size:.68rem;color:var(--ink-faint);margin-left:42%;padding-left:8px}
  /* comparison table */
  .cmp{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:12px -4px;border-radius:10px}
  .cmp table{min-width:640px;font-size:.85rem}
  .cmp td,.cmp th{border:1px solid var(--line);padding:8px 9px;vertical-align:top}
  .cmp th{position:sticky;top:0;background:#1c1730}
  .cmp td:first-child{font-weight:bold;color:#efe7ff;background:#161226}
  @media (max-width:520px){
    h1{font-size:1.25rem}
    .card{padding:15px 14px 11px}

  /* ---------- debate chat ---------- */
  #debate{padding-top:14px}
  .dbt-note{font-size:.82rem;color:var(--ink-dim);background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:10px}

  details.dbt-settings{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden}
  details.dbt-settings>summary{padding:12px 14px;cursor:pointer;color:var(--gold);font-family:system-ui,sans-serif;font-size:.9rem;list-style:none}

  .dbt-set-body{padding:4px 14px 14px;border-top:1px solid var(--line)}

  .dbt-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .dbt-btn{padding:9px 15px;border-radius:9px;border:1px solid var(--gold-soft);background:#d4a94e18;color:var(--gold);font-family:system-ui,sans-serif;font-size:.86rem;cursor:pointer}
  .dbt-btn.sec{border-color:var(--line);color:var(--ink-dim);background:none}
  .dbt-log{min-height:200px;display:flex;flex-direction:column;gap:12px;margin-bottom:12px}
  .dbt-msg{max-width:92%;padding:12px 15px;border-radius:14px;font-size:.95rem;line-height:1.6}
  .dbt-msg.user{align-self:flex-end;background:linear-gradient(160deg,#2a2350,#241d3d);border:1px solid var(--violet);border-bottom-right-radius:4px}
  .dbt-msg.ai{align-self:flex-start;background:linear-gradient(160deg,var(--card),var(--card2));border:1px solid var(--line);border-bottom-left-radius:4px}
  .dbt-msg.err{align-self:flex-start;background:#e0785a18;border:1px solid #e0785a66;color:#ffd9cc;font-size:.86rem;font-family:system-ui,sans-serif}
  .dbt-msg strong{color:#efe7ff}.dbt-msg.user strong{color:#fff}
  .dbt-msg code{background:#0d0b14;padding:1px 5px;border-radius:4px;font-size:.86em}
  .dbt-who{font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;font-family:system-ui,sans-serif;opacity:.6;margin-bottom:4px}
  .dbt-typing{align-self:flex-start;color:var(--ink-faint);font-size:.85rem;font-style:italic;padding:6px 4px}
  .dbt-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .dbt-chip{font-size:.83rem;color:#cdbff0;border:1px solid var(--line);border-radius:16px;padding:7px 12px;cursor:pointer;background:var(--bg2);text-align:left}
  .dbt-chip:hover{border-color:var(--violet)}
  .dbt-bar{display:flex;gap:8px;align-items:flex-end;position:sticky;bottom:8px;background:#0d0b14ee;padding:8px;border:1px solid var(--line);border-radius:14px;backdrop-filter:blur(8px)}
  .dbt-bar textarea{flex:1;resize:none;min-height:24px;max-height:140px;padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:var(--bg2);color:var(--ink);font-size:.95rem;font-family:inherit;outline:none;line-height:1.4}
  .dbt-bar textarea:focus{border-color:var(--violet)}
  .dbt-send{flex:0 0 auto;width:44px;height:44px;border-radius:11px;border:none;background:linear-gradient(160deg,var(--violet),#6a52b0);color:#fff;font-size:1.1rem;cursor:pointer}

</style>
