name: Materialize Bói toán V11

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/export-boitoan-snapshot.yml
      - .migration/**
      - tools/materialize-boitoan-v11.mjs
      - docs/handover/ACTIVE_TASKS.json
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: materialize-boitoan-v11
  cancel-in-progress: false

jobs:
  materialize:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'agent/BOITOAN-20260724-15-rebuild'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/BOITOAN-20260724-15-rebuild
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - name: Sinh baseline hiện hành một lần cuối
        run: |
          set -euo pipefail
          node tools/apply-role-system.mjs
          node tools/apply-account-v2-runner.mjs
          node tools/apply-account-v3-hotfix.mjs
      - name: Chuyển sang source trực tiếp V11
        run: |
          set -euo pipefail
          node tools/materialize-boitoan-v11.mjs
          rm -f tools/materialize-boitoan-v11.mjs
      - name: Kiểm tra và đóng gói source
        run: |
          set -euo pipefail
          node --check assets/gate.js
          node --check assets/community.js
          node --check assets/community-admin.js
          node --check backend/community.js
          node --check backend/worker.js
          tar -czf "$RUNNER_TEMP/boitoan-v11-materialized.tar.gz" \
            boitoan assets backend tools docs/handover \
            .github/workflows/deploy-pages.yml \
            .github/workflows/validate-role-system.yml \
            .github/workflows/verify-admin-v9-return.yml \
            .github/workflows/e2e-reader-production.yml
          git status --short > "$RUNNER_TEMP/git-status.txt"
      - name: Thử commit và push, lưu toàn bộ chẩn đoán
        id: persist
        continue-on-error: true
        run: |
          set +e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: materialize Bói toán V11 direct source" > "$RUNNER_TEMP/commit.log" 2>&1
          commit_code=$?
          git push --force-with-lease origin HEAD:agent/BOITOAN-20260724-15-rebuild > "$RUNNER_TEMP/push.log" 2>&1
          push_code=$?
          printf 'commit_code=%s\npush_code=%s\nhead=%s\n' "$commit_code" "$push_code" "$(git rev-parse HEAD)" > "$RUNNER_TEMP/persist-status.txt"
          cat "$RUNNER_TEMP/commit.log"
          cat "$RUNNER_TEMP/push.log"
          test "$commit_code" = 0 -a "$push_code" = 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: boitoan-v11-materialized-diagnostic
          path: |
            ${{ runner.temp }}/boitoan-v11-materialized.tar.gz
            ${{ runner.temp }}/git-status.txt
            ${{ runner.temp }}/commit.log
            ${{ runner.temp }}/push.log
            ${{ runner.temp }}/persist-status.txt
          retention-days: 2
      - name: Kết luận persist
        if: always()
        run: test "${{ steps.persist.outcome }}" = "success"
