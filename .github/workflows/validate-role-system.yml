name: Kiểm tra hệ thống tài khoản Khách Reader Admin

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }

      - name: Xác nhận source trực tiếp
        run: |
          set -euo pipefail
          before=$(git status --porcelain)
          node tools/apply-role-system.mjs
          node tools/apply-account-v2-runner.mjs
          node tools/apply-account-v3-hotfix.mjs
          after=$(git status --porcelain)
          test "$before" = "$after"
          grep -q 'Bói toán V11' assets/gate.js
          grep -q 'openAppContent(data.key, "admin-session")' assets/gate.js

      - name: Kiểm tra frontend và Worker
        run: |
          set -euo pipefail
          node --check assets/gate.js
          node --check assets/community.js
          node --check assets/community-admin.js
          node --check tools/admin-v9-return-webkit-check.mjs
          node assets/gate.test.mjs
          node assets/account-v2.test.mjs
          node --check boitoan/sw.js
          node boitoan/sw.test.mjs
          node --check backend/community.js
          node backend/community.test.mjs
          node backend/account-v2.test.mjs
          node backend/admin-v8-health.test.mjs
          node --check backend/worker.js
          node backend/worker.test.mjs

      - name: Kiểm tra WebKit với payload AES thật
        run: |
          set -euo pipefail
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps webkit
          LOCAL_GATE_JS=1 node tools/admin-v9-return-webkit-check.mjs "$GITHUB_SHA"
