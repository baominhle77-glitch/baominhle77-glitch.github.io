name: Kiểm tra hệ thống tài khoản Khách Reader Admin

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - name: Áp dụng lớp tích hợp
        run: |
          set -o pipefail
          {
            node --check tools/apply-account-v2-runner.mjs
            node --check tools/apply-admin-v5-v6-runner.mjs
            node --check tools/apply-account-v3-hotfix.mjs
            node --check tools/apply-account-v4-edge-auth.mjs
            node --check tools/apply-admin-session-v5.mjs
            node --check tools/apply-admin-levels-v6.mjs
            node --check tools/apply-admin-v7-login-hotfix.mjs
            node --check tools/apply-admin-v8-edge-login.mjs
            node --check tools/apply-admin-v8-tests.mjs
            node tools/apply-role-system.mjs
            node tools/apply-account-v2-runner.mjs
            # Chạy lại riêng chuỗi Admin V5-V8 để xác nhận idempotent.
            node tools/apply-admin-v5-v6-runner.mjs
          } 2>&1 | tee account-v8-apply.log
      - name: Kiểm tra frontend
        run: |
          set -o pipefail
          {
            node --check assets/gate.js
            node --check assets/community.js
            node --check assets/community-admin.js
            node --check tools/webkit-production-check.mjs
            node assets/gate.test.mjs
            node assets/account-v2.test.mjs
            node --check boitoan/sw.js
            node boitoan/sw.test.mjs
          } 2>&1 | tee account-v8-frontend.log
      - name: Kiểm tra Worker
        run: |
          set -o pipefail
          {
            node --check backend/community.js
            node backend/community.test.mjs
            node backend/account-v2.test.mjs
            node backend/admin-v8-health.test.mjs
            node --check backend/worker.js
            node backend/worker.test.mjs
          } 2>&1 | tee account-v8-worker.log
      - name: Lưu log chẩn đoán
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: account-v8-diagnostic-log
          path: |
            account-v8-apply.log
            account-v8-frontend.log
            account-v8-worker.log
          if-no-files-found: warn
          retention-days: 3
      - name: Kết luận
        run: echo "Account V8 CI PASS"
