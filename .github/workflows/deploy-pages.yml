name: Deploy lên Cloudflare Pages (hiennhi89.pages.dev)

on:
  push:
    branches: [main]
    paths-ignore:
      - HANDOVER.md
      - docs/handover/**
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: "997944c1bfcc2dcaca32718124cd718c"
      KV_NAMESPACE_ID: "1030b053db194312be8adbfc24e73a85"
    steps:
      - name: Checkout repo chính
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Bung gói nguồn Vietnam Travel nếu còn gói tạm
        run: |
          set -euo pipefail
          if ! compgen -G '.travel-bundle/chunk-*' > /dev/null; then
            echo 'Source Vietnam Travel đã được materialize.'
            exit 0
          fi

          cat .travel-bundle/chunk-* > "$RUNNER_TEMP/vietnam-travel-source.tar.gz.b64"
          base64 --decode "$RUNNER_TEMP/vietnam-travel-source.tar.gz.b64" > "$RUNNER_TEMP/vietnam-travel-source.tar.gz"
          echo "1511d9f80024a4a495e955e88680b4400a3d20973afd530edcb509457dbcad30  $RUNNER_TEMP/vietnam-travel-source.tar.gz" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/vietnam-travel-source.tar.gz" -C .

          rm -rf .travel-bundle
          rm -f .github/workflows/materialize-vietnam-travel.yml
          rm -f .github/workflows/deploy-vietnam-travel.yml

          node --check backend/travel.js
          node --test backend/travel.test.mjs
          node --check tools/apply-travel-system.mjs
          node --check vietnam-travel/app.js
          node --check vietnam-travel/sw.js
          node --check vietnam-travel/data/seed-places.js
          node -e 'JSON.parse(require("node:fs").readFileSync("vietnam-travel/manifest.webmanifest", "utf8"))'

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: materialize source Vietnam Travel"
          git fetch origin main
          if [ "$(git rev-parse origin/main)" != "$(git rev-parse HEAD^)" ]; then
            git rebase origin/main
          fi
          git push origin HEAD:main

      - name: Kiểm tra secret deploy
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "::error::Thiếu CLOUDFLARE_API_TOKEN"; exit 1; }
          npx --yes wrangler@4.112.0 secret list --config backend/wrangler.toml --format json > "$RUNNER_TEMP/worker-secrets.json"
          node - <<'NODE' "$RUNNER_TEMP/worker-secrets.json"
          const secrets = require(process.argv[2]);
          for (const name of [
            "DECRYPT_KEY_SPARE", "SESSION_SECRET", "ADMIN_TOKEN",
            "TELEGRAM_BOT_TOKEN", "TELEGRAM_CHAT_ID", "TELEGRAM_WEBHOOK_SECRET"
          ]) {
            if (!secrets.some((item) => item.name === name)) {
              console.error(`::error::Worker thiếu ${name}`);
              process.exit(1);
            }
          }
          NODE

      - name: Áp dụng các lớp build hiện hành và Travel
        run: |
          set -euo pipefail
          node --check tools/apply-account-v3-hotfix.mjs
          node tools/apply-role-system.mjs
          node tools/apply-account-v2-runner.mjs
          node tools/apply-account-v3-hotfix.mjs
          node tools/apply-travel-system.mjs

      - name: Kiểm tra source và Worker
        run: |
          set -euo pipefail
          node tools/validate-coordination.mjs
          node --check assets/gate.js
          node --check assets/community.js
          node --check assets/community-admin.js
          node assets/gate.test.mjs
          node assets/account-v2.test.mjs
          node --check sw.js
          node --check boitoan/sw.js
          node sw.test.mjs
          node boitoan/sw.test.mjs
          node --check backend/community.js
          node backend/community.test.mjs
          node backend/account-v2.test.mjs
          node --check backend/travel.js
          node --test backend/travel.test.mjs
          node --check backend/worker.js
          node backend/worker.test.mjs
          node --check vietnam-travel/app.js
          node --check vietnam-travel/sw.js
          node --check vietnam-travel/data/seed-places.js
          grep -q 'Travel API integration v1' backend/worker.js
          grep -q 'Travel Telegram integration v1' backend/worker.js

      - name: Gộp site (SPARE + Bói toán + MEDORA + Vietnam Travel)
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/boitoan _site/assets _site/medora _site/vietnam-travel/data
          cp index.html manifest.webmanifest sw.js _site/
          cp assets/gate.js assets/gate.css assets/community.js assets/community-admin.js assets/community.css _site/assets/
          cp robots.txt _site/robots.txt
          cp boitoan/index.html boitoan/community.html boitoan/community-admin.html boitoan/sw.js boitoan/manifest.webmanifest boitoan/icon-192.png boitoan/icon.png _site/boitoan/
          cp medora/index.html _site/medora/index.html
          cp vietnam-travel/index.html vietnam-travel/app.css vietnam-travel/app.js vietnam-travel/manifest.webmanifest vietnam-travel/sw.js vietnam-travel/icon.svg _site/vietnam-travel/
          cp vietnam-travel/data/seed-places.js _site/vietnam-travel/data/

      - name: Deploy lên Cloudflare Pages
        run: npx --yes wrangler@4.112.0 pages deploy _site --project-name hiennhi89 --branch main --commit-dirty=true

      - name: Deploy Worker sau Pages
        working-directory: backend
        run: npx --yes wrangler@4.112.0 deploy

      - name: Hậu kiểm production Vietnam Travel và app hiện có
        run: |
          set -euo pipefail
          cache_bust="deploy=${GITHUB_SHA}"
          travel_code=""
          seed_code=""
          health_code=""
          places_code=""
          root_code=""
          boitoan_code=""
          medora_code=""

          for attempt in $(seq 1 30); do
            travel_code=$(curl -sSL -o "$RUNNER_TEMP/travel.html" -w "%{http_code}" --max-time 20 "https://hiennhi89.pages.dev/vietnam-travel/?${cache_bust}" || true)
            seed_code=$(curl -sSL -o "$RUNNER_TEMP/seed.js" -w "%{http_code}" --max-time 20 "https://hiennhi89.pages.dev/vietnam-travel/data/seed-places.js?${cache_bust}" || true)
            health_code=$(curl -sS -o "$RUNNER_TEMP/travel-health.json" -w "%{http_code}" --max-time 20 "https://hiennhi89-gate.hiennhi89.workers.dev/api/travel/health" || true)
            places_code=$(curl -sS -o "$RUNNER_TEMP/travel-places.json" -w "%{http_code}" --max-time 20 "https://hiennhi89-gate.hiennhi89.workers.dev/api/travel/places" || true)
            root_code=$(curl -sSL -o /dev/null -w "%{http_code}" --max-time 20 "https://hiennhi89.pages.dev/?${cache_bust}" || true)
            boitoan_code=$(curl -sSL -o "$RUNNER_TEMP/community.html" -w "%{http_code}" --max-time 20 "https://hiennhi89.pages.dev/boitoan/community.html?${cache_bust}" || true)
            medora_code=$(curl -sSL -o /dev/null -w "%{http_code}" --max-time 20 "https://hiennhi89.pages.dev/medora/?${cache_bust}" || true)

            if [ "$travel_code" = "200" ] \
              && grep -q "Việt Nam Đi Đâu?" "$RUNNER_TEMP/travel.html" \
              && [ "$seed_code" = "200" ] \
              && grep -q "vinh-ha-long" "$RUNNER_TEMP/seed.js" \
              && [ "$health_code" = "200" ] \
              && grep -q '"service":"vietnam-travel"' "$RUNNER_TEMP/travel-health.json" \
              && [ "$places_code" = "200" ] \
              && grep -q '"vinh-ha-long"' "$RUNNER_TEMP/travel-places.json" \
              && [ "$root_code" = "200" ] \
              && [ "$boitoan_code" = "200" ] \
              && grep -q "Spirituality Market" "$RUNNER_TEMP/community.html" \
              && [ "$medora_code" = "200" ]; then
              echo "Production đạt: Travel=$travel_code API=$places_code Root=$root_code BoiToan=$boitoan_code Medora=$medora_code"
              exit 0
            fi
            sleep 4
          done

          echo "::error::Hậu kiểm Vietnam Travel hoặc app hiện có không đạt"
          printf 'travel=%s seed=%s health=%s places=%s root=%s boitoan=%s medora=%s\n' \
            "$travel_code" "$seed_code" "$health_code" "$places_code" "$root_code" "$boitoan_code" "$medora_code"
          cat "$RUNNER_TEMP/travel-health.json" 2>/dev/null || true
          cat "$RUNNER_TEMP/travel-places.json" 2>/dev/null || true
          exit 1
