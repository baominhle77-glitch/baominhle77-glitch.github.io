name: Deploy lên Cloudflare Pages (hiennhi89.pages.dev)

on:
  push:
    branches: [main]
    paths-ignore:
      - HANDOVER.md
      - docs/handover/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: "997944c1bfcc2dcaca32718124cd718c"
    steps:
      - name: Checkout repo chính
        uses: actions/checkout@v4

      - name: Kiểm tra secret deploy
        run: test -n "$CLOUDFLARE_API_TOKEN" || { echo "::error::Thiếu CLOUDFLARE_API_TOKEN"; exit 1; }

      - name: Setup Node
        uses: actions/setup-node@v4
        with: { node-version: "22" }

      - name: Kiểm tra source
        run: |
          node --check assets/gate.js
          node assets/gate.test.mjs
          node --check sw.js
          node --check boitoan/sw.js
          node sw.test.mjs
          node boitoan/sw.test.mjs

      - name: Gộp site (SPARE + Bói toán + MEDORA)
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/boitoan _site/assets _site/medora
          cp index.html manifest.webmanifest sw.js _site/
          cp assets/gate.js assets/gate.css _site/assets/
          cp robots.txt _site/robots.txt
          cp boitoan/index.html boitoan/sw.js boitoan/manifest.webmanifest boitoan/icon.png _site/boitoan/
          cp medora/index.html _site/medora/index.html

      - name: Deploy lên Cloudflare Pages
        run: npx --yes wrangler@4.112.0 pages deploy _site --project-name hiennhi89 --branch main --commit-dirty=true
