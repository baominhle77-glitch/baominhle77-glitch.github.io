name: Deploy lên Cloudflare Pages (hiennhi89.pages.dev)

on:
  push:
    branches: [main]
    paths-ignore:
      - HANDOVER.md
      - docs/handover/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: "997944c1bfcc2dcaca32718124cd718c"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }

      - name: Kiểm tra cấu hình Cloudflare
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_API_TOKEN"
          npx --yes wrangler@4.112.0 secret list --config backend/wrangler.toml --format json > "$RUNNER_TEMP/secrets.json"
          node - <<'NODE' "$RUNNER_TEMP/secrets.json"
          const values = require(process.argv[2]).map(({name}) => name);
          for (const name of ["SESSION_SECRET", "TELEGRAM_BOT_TOKEN", "TELEGRAM_CHAT_ID", "TELEGRAM_WEBHOOK_SECRET"]) {
            if (!values.includes(name)) throw new Error(`Worker thiếu ${name}`);
          }
          if (!values.includes("DECRYPT_KEY_BOITOAN") && !values.includes("DECRYPT_KEY")) {
            throw new Error("Worker thiếu khóa giải mã Bói toán");
          }
          NODE

      - name: Kiểm tra source trực tiếp
        run: |
          set -euo pipefail
          node tools/apply-travel-system.mjs
          node --check assets/gate.js
          node --check assets/community.js
          node --check assets/community-admin.js
          node assets/gate.test.mjs
          node assets/account-v2.test.mjs
          node boitoan/sw.test.mjs
          node --check backend/community.js
          node backend/community.test.mjs
          node backend/account-v2.test.mjs
          node backend/admin-v8-health.test.mjs
          node --check backend/worker.js
          node backend/worker.test.mjs
          node --test backend/travel.test.mjs
          grep -q 'Bói toán V11' assets/gate.js
          grep -q '/assets/gate.js?v=19' boitoan/index.html
          grep -q 'boitoan-v19' boitoan/sw.js

      - name: Gộp site
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/boitoan _site/assets _site/medora _site/vietnam-travel/data
          cp index.html manifest.webmanifest sw.js robots.txt _site/
          cp assets/gate.js assets/gate.css assets/community.js assets/community-admin.js assets/community.css _site/assets/
          cp boitoan/index.html boitoan/community.html boitoan/community-admin.html boitoan/sw.js boitoan/manifest.webmanifest boitoan/icon-192.png boitoan/icon.png _site/boitoan/
          cp medora/index.html _site/medora/index.html
          cp vietnam-travel/index.html vietnam-travel/app.css vietnam-travel/app.js vietnam-travel/manifest.webmanifest vietnam-travel/sw.js vietnam-travel/icon.svg _site/vietnam-travel/
          cp vietnam-travel/data/seed-places.js _site/vietnam-travel/data/

      - name: Deploy Worker trước Pages
        working-directory: backend
        run: npx --yes wrangler@4.112.0 deploy

      - name: Deploy Pages
        run: npx --yes wrangler@4.112.0 pages deploy _site --project-name hiennhi89 --branch main --commit-dirty=true

      - name: Hậu kiểm production
        run: |
          set -euo pipefail
          bust="v11=${GITHUB_SHA}-${GITHUB_RUN_ID}"
          for attempt in $(seq 1 30); do
            app=$(curl -fsSL "https://hiennhi89.pages.dev/boitoan/?$bust" || true)
            gate=$(curl -fsSL "https://hiennhi89.pages.dev/assets/gate.js?$bust" || true)
            admin=$(curl -fsSL "https://hiennhi89.pages.dev/boitoan/community-admin.html?$bust" || true)
            health=$(curl -fsSL "https://hiennhi89-gate.hiennhi89.workers.dev/api/community/admin/health" || true)
            if grep -q 'application/gate-payload' <<<"$app" \
              && grep -q '/assets/gate.js?v=19' <<<"$app" \
              && grep -q 'Bói toán V11' <<<"$gate" \
              && grep -q 'openAppContent(data.key, "admin-session")' <<<"$gate" \
              && grep -q 'admin_return=1&v=19' <<<"$admin" \
              && grep -q '"auth_version":"2026-07-24-v11"' <<<"$health" \
              && grep -q '"config_ok":true' <<<"$health" \
              && grep -q '"crypto_ok":true' <<<"$health" \
              && grep -q '"decrypt_key_configured":true' <<<"$health"; then
              echo "Production V11 đạt ở lần $attempt"
              exit 0
            fi
            sleep 4
          done
          echo "Production chưa đồng bộ V11" >&2
          exit 1
