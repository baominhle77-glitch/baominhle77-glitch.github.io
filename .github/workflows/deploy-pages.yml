name: Deploy lên Cloudflare Pages (hiennhi89.pages.dev)

on:
  push:
    branches: [main]
    paths-ignore:
      - HANDOVER.md
      - docs/handover/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: "997944c1bfcc2dcaca32718124cd718c"
    steps:
      - name: Checkout repo chính
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with: { node-version: "22" }

      - name: Kiểm tra secret deploy
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "::error::Thiếu CLOUDFLARE_API_TOKEN"; exit 1; }
          npx --yes wrangler@4.112.0 secret list --config backend/wrangler.toml --format json > "$RUNNER_TEMP/worker-secrets.json"
          node -e "const s=require(process.argv[1]); if (!s.some(({name}) => name === 'DECRYPT_KEY_SPARE')) { console.error('::error::Worker thiếu DECRYPT_KEY_SPARE'); process.exit(1); }" "$RUNNER_TEMP/worker-secrets.json"

      - name: Áp dụng hệ thống tài khoản Khách Reader Admin
        run: node tools/apply-role-system.mjs

      - name: Kiểm tra source
        run: |
          node --check assets/gate.js
          node --check assets/community.js
          node --check assets/community-admin.js
          node assets/gate.test.mjs
          node --check sw.js
          node --check boitoan/sw.js
          node sw.test.mjs
          node boitoan/sw.test.mjs

      - name: Kiểm tra Worker
        run: |
          node --check backend/community.js
          node backend/community.test.mjs
          node --check backend/worker.js
          node backend/worker.test.mjs

      - name: Gộp site (SPARE + Bói toán + MEDORA)
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/boitoan _site/assets _site/medora
          cp index.html manifest.webmanifest sw.js _site/
          cp assets/gate.js assets/gate.css assets/community.js assets/community-admin.js assets/community.css _site/assets/
          cp robots.txt _site/robots.txt
          cp boitoan/index.html boitoan/community.html boitoan/community-admin.html boitoan/sw.js boitoan/manifest.webmanifest boitoan/icon-192.png boitoan/icon.png _site/boitoan/
          cp medora/index.html _site/medora/index.html

      - name: Deploy lên Cloudflare Pages
        run: npx --yes wrangler@4.112.0 pages deploy _site --project-name hiennhi89 --branch main --commit-dirty=true

      - name: Deploy Worker sau Pages
        working-directory: backend
        run: npx --yes wrangler@4.112.0 deploy
