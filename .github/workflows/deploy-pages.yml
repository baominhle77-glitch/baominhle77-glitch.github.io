name: Deploy lên Cloudflare Pages (hiennhi89.pages.dev)

on:
  push:
    branches: [main]
    paths-ignore:
      - HANDOVER.md
      - docs/handover/**
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: "997944c1bfcc2dcaca32718124cd718c"
      KV_NAMESPACE_ID: "1030b053db194312be8adbfc24e73a85"
    steps:
      - name: Checkout repo chính
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with: { node-version: "22" }

      - name: Kiểm tra secret deploy
        id: preflight
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "::error::Thiếu CLOUDFLARE_API_TOKEN"; exit 1; }
          npx --yes wrangler@4.112.0 secret list --config backend/wrangler.toml --format json > "$RUNNER_TEMP/worker-secrets.json"
          node - <<'NODE' "$RUNNER_TEMP/worker-secrets.json"
          const secrets = require(process.argv[2]);
          for (const name of ["DECRYPT_KEY_SPARE", "SESSION_SECRET", "ADMIN_TOKEN"]) {
            if (!secrets.some((item) => item.name === name)) {
              console.error(`::error::Worker thiếu ${name}`);
              process.exit(1);
            }
          }
          NODE

      - name: Áp dụng hệ thống tài khoản Khách Reader Admin
        id: integrate
        run: |
          node --check tools/apply-account-v3-hotfix.mjs
          node tools/apply-role-system.mjs
          node tools/apply-account-v2-runner.mjs
          node tools/apply-account-v3-hotfix.mjs

      - name: Kiểm tra source
        id: test_source
        run: |
          node --check assets/gate.js
          node --check assets/community.js
          node --check assets/community-admin.js
          node assets/gate.test.mjs
          node assets/account-v2.test.mjs
          node --check sw.js
          node --check boitoan/sw.js
          node sw.test.mjs
          node boitoan/sw.test.mjs

      - name: Kiểm tra Worker
        id: test_worker
        run: |
          node --check backend/community.js
          node backend/community.test.mjs
          node backend/account-v2.test.mjs
          node --check backend/worker.js
          node backend/worker.test.mjs

      - name: Gộp site (SPARE + Bói toán + MEDORA)
        id: build
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/boitoan _site/assets _site/medora
          cp index.html manifest.webmanifest sw.js _site/
          cp assets/gate.js assets/gate.css assets/community.js assets/community-admin.js assets/community.css _site/assets/
          cp robots.txt _site/robots.txt
          cp boitoan/index.html boitoan/community.html boitoan/community-admin.html boitoan/sw.js boitoan/manifest.webmanifest boitoan/icon-192.png boitoan/icon.png _site/boitoan/
          cp medora/index.html _site/medora/index.html

      - name: Deploy lên Cloudflare Pages
        id: deploy_pages
        run: npx --yes wrangler@4.112.0 pages deploy _site --project-name hiennhi89 --branch main --commit-dirty=true

      - name: Deploy Worker sau Pages
        id: deploy_worker
        working-directory: backend
        run: npx --yes wrangler@4.112.0 deploy

      - name: Hậu kiểm production
        id: smoke
        run: |
          set -euo pipefail
          page_code=""
          page_url=""
          admin_page_code=""
          css_code=""
          gate_code=""
          worker_code=""
          posts_code=""
          entry_code=""
          cache_bust="deploy=${GITHUB_SHA}"
          for attempt in $(seq 1 30); do
            page_meta=$(curl -sSL -o "$RUNNER_TEMP/community.html" -w "%{http_code}|%{url_effective}" --max-time 20 "https://hiennhi89.pages.dev/boitoan/community.html?${cache_bust}" || true)
            page_code=${page_meta%%|*}
            page_url=${page_meta#*|}
            admin_page_code=$(curl -sSL -o "$RUNNER_TEMP/community-admin.html" -w "%{http_code}" --max-time 20 "https://hiennhi89.pages.dev/boitoan/community-admin.html?${cache_bust}" || true)
            css_code=$(curl -sSL -o "$RUNNER_TEMP/community.css" -w "%{http_code}" --max-time 20 "https://hiennhi89.pages.dev/assets/community.css?${cache_bust}" || true)
            gate_code=$(curl -sSL -o "$RUNNER_TEMP/gate.js" -w "%{http_code}" --max-time 20 "https://hiennhi89.pages.dev/assets/gate.js?${cache_bust}" || true)
            worker_code=$(curl -sS -o "$RUNNER_TEMP/community-api.json" -w "%{http_code}" --max-time 20 "https://hiennhi89-gate.hiennhi89.workers.dev/api/community/readers" || true)
            posts_code=$(curl -sS -o "$RUNNER_TEMP/community-posts.json" -w "%{http_code}" --max-time 20 "https://hiennhi89-gate.hiennhi89.workers.dev/api/community/posts" || true)
            entry_code=$(curl -sS -o "$RUNNER_TEMP/community-entry.json" -w "%{http_code}" --max-time 20 \
              -H 'content-type: application/json' \
              --data '{"entry":true,"device_id":"00000000-0000-4000-8000-000000000001","role":"guest","username":"x","password":"short","display_name":""}' \
              "https://hiennhi89-gate.hiennhi89.workers.dev/api/community/register" || true)
            if [ "$page_code" = "200" ] \
              && grep -q "Spirituality Market" "$RUNNER_TEMP/community.html" \
              && grep -q "Reader / Người xem bói" "$RUNNER_TEMP/community.html" \
              && [ "$admin_page_code" = "200" ] \
              && grep -q 'data-admin-tab="posts"' "$RUNNER_TEMP/community-admin.html" \
              && [ "$css_code" = "200" ] \
              && grep -q "Account V2 role UI" "$RUNNER_TEMP/community.css" \
              && [ "$gate_code" = "200" ] \
              && grep -q "gate-entry-choice" "$RUNNER_TEMP/gate.js" \
              && grep -q "claimPrimaryAdminDevice" "$RUNNER_TEMP/gate.js" \
              && grep -q "if (!payload)" "$RUNNER_TEMP/gate.js" \
              && grep -q "community-admin.html" "$RUNNER_TEMP/gate.js" \
              && grep -q "Mở quản trị" "$RUNNER_TEMP/gate.js" \
              && grep -q "Account V3 admin navigation" "$RUNNER_TEMP/gate.js" \
              && [ "$worker_code" = "401" ] \
              && grep -q '"unauthorized"' "$RUNNER_TEMP/community-api.json" \
              && [ "$posts_code" = "401" ] \
              && grep -q '"unauthorized"' "$RUNNER_TEMP/community-posts.json" \
              && [ "$entry_code" = "400" ] \
              && grep -q '"invalid_account"' "$RUNNER_TEMP/community-entry.json"; then
              break
            fi
            sleep 4
          done
          {
            echo "page_code=$page_code"
            echo "page_url=$page_url"
            echo "admin_page_code=$admin_page_code"
            echo "css_code=$css_code"
            echo "gate_code=$gate_code"
            echo "worker_code=$worker_code"
            echo "posts_code=$posts_code"
            echo "entry_code=$entry_code"
          } >> "$GITHUB_OUTPUT"
          test "$page_code" = "200"
          grep -q "Spirituality Market" "$RUNNER_TEMP/community.html"
          grep -q "Reader / Người xem bói" "$RUNNER_TEMP/community.html"
          test "$admin_page_code" = "200"
          grep -q 'data-admin-tab="posts"' "$RUNNER_TEMP/community-admin.html"
          test "$css_code" = "200"
          grep -q "Account V2 role UI" "$RUNNER_TEMP/community.css"
          test "$gate_code" = "200"
          grep -q "gate-entry-choice" "$RUNNER_TEMP/gate.js"
          grep -q "claimPrimaryAdminDevice" "$RUNNER_TEMP/gate.js"
          grep -q "if (!payload)" "$RUNNER_TEMP/gate.js"
          grep -q "community-admin.html" "$RUNNER_TEMP/gate.js"
          grep -q "Mở quản trị" "$RUNNER_TEMP/gate.js"
          grep -q "Account V3 admin navigation" "$RUNNER_TEMP/gate.js"
          test "$worker_code" = "401"
          grep -q '"unauthorized"' "$RUNNER_TEMP/community-api.json"
          test "$posts_code" = "401"
          grep -q '"unauthorized"' "$RUNNER_TEMP/community-posts.json"
          test "$entry_code" = "400"
          grep -q '"invalid_account"' "$RUNNER_TEMP/community-entry.json"

      - name: E2E production Reader trên hai thiết bị và tự xóa
        id: e2e_reader
        if: contains(github.event.head_commit.message, 'Reader E2E hotfix')
        run: |
          set -euo pipefail
          api="https://hiennhi89-gate.hiennhi89.workers.dev"
          username="e2e_reader_${GITHUB_RUN_ID}"
          password="E2EReader-${GITHUB_RUN_ID}!"
          did1=$(node -e 'console.log(require("node:crypto").randomUUID())')
          did2=$(node -e 'console.log(require("node:crypto").randomUUID())')
          uid=""; community_sid1=""; community_sid2=""; gate_sid1=""; gate_sid2=""

          encode_key() { node -e 'process.stdout.write(encodeURIComponent(process.argv[1]))' "$1"; }
          delete_key() {
            local key="$1" encoded
            encoded=$(encode_key "$key")
            curl --fail-with-body -sS -X DELETE \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/storage/kv/namespaces/$KV_NAMESPACE_ID/values/$encoded" >/dev/null
          }
          cleanup_best_effort() {
            set +e
            [ -n "$username" ] && delete_key "community-login:$username"
            [ -n "$uid" ] && delete_key "community-profile:$uid"
            [ -n "$uid" ] && delete_key "community-reader:$uid"
            delete_key "community-device:boitoan:$did1"
            delete_key "community-device:boitoan:$did2"
            [ -n "$community_sid1" ] && delete_key "community-session:$community_sid1"
            [ -n "$community_sid2" ] && delete_key "community-session:$community_sid2"
            [ -n "$gate_sid1" ] && delete_key "session:$gate_sid1"
            [ -n "$gate_sid2" ] && delete_key "session:$gate_sid2"
          }
          trap cleanup_best_effort EXIT

          node - <<'NODE' "$RUNNER_TEMP/register-body.json" "$username" "$password" "$did1"
          const fs=require('node:fs');
          fs.writeFileSync(process.argv[2], JSON.stringify({
            entry:true, device_id:process.argv[5],
            device:{ua:'GitHub Actions E2E Android Chrome',lang:'vi-VN',tz:'Asia/Ho_Chi_Minh',screen:'412x915',platform:'Android'},
            role:'reader', username:process.argv[3], password:process.argv[4],
            display_name:'KIỂM THỬ READER TỰ XÓA', bio:'', specialties:'Tarot, Lenormand'
          }));
          NODE
          register_code=$(curl -sS -o "$RUNNER_TEMP/register-response.json" -w "%{http_code}" --max-time 30 \
            -H 'content-type: application/json' -H 'user-agent: GitHub-Actions-E2E-Android-Chrome' \
            --data-binary @"$RUNNER_TEMP/register-body.json" "$api/api/community/register")
          test "$register_code" = "201"
          node - <<'NODE' "$RUNNER_TEMP/register-response.json"
          const d=require(process.argv[2]);
          if (!d.token || !d.gate_token || !d.profile || d.profile.role !== 'reader') throw new Error('register contract incomplete');
          NODE
          uid=$(node -e 'console.log(require(process.argv[1]).profile.id)' "$RUNNER_TEMP/register-response.json")
          register_token=$(node -e 'console.log(require(process.argv[1]).token)' "$RUNNER_TEMP/register-response.json")
          register_gate=$(node -e 'console.log(require(process.argv[1]).gate_token)' "$RUNNER_TEMP/register-response.json")
          community_sid1=$(node -e 'console.log(JSON.parse(Buffer.from(process.argv[1].split(".")[1],"base64url")).sid)' "$register_token")
          gate_sid1=$(node -e 'console.log(JSON.parse(Buffer.from(process.argv[1].split(".")[1],"base64url")).sid)' "$register_gate")

          node - <<'NODE' "$RUNNER_TEMP/login-body.json" "$username" "$password" "$did2"
          const fs=require('node:fs');
          fs.writeFileSync(process.argv[2], JSON.stringify({
            entry:true, device_id:process.argv[5],
            device:{ua:'GitHub Actions E2E iPad Safari',lang:'vi-VN',tz:'Asia/Ho_Chi_Minh',screen:'1024x1366',platform:'iPad'},
            username:process.argv[3], password:process.argv[4]
          }));
          NODE
          login_code=$(curl -sS -o "$RUNNER_TEMP/login-response.json" -w "%{http_code}" --max-time 30 \
            -H 'content-type: application/json' -H 'user-agent: GitHub-Actions-E2E-iPad-Safari' \
            --data-binary @"$RUNNER_TEMP/login-body.json" "$api/api/community/login")
          test "$login_code" = "200"
          node - <<'NODE' "$RUNNER_TEMP/login-response.json" "$uid"
          const d=require(process.argv[2]);
          if (!d.token || !d.gate_token || !d.profile || d.profile.id !== process.argv[3] || d.profile.role !== 'reader') throw new Error('cross-device login failed');
          NODE
          login_token=$(node -e 'console.log(require(process.argv[1]).token)' "$RUNNER_TEMP/login-response.json")
          login_gate=$(node -e 'console.log(require(process.argv[1]).gate_token)' "$RUNNER_TEMP/login-response.json")
          community_sid2=$(node -e 'console.log(JSON.parse(Buffer.from(process.argv[1].split(".")[1],"base64url")).sid)' "$login_token")
          gate_sid2=$(node -e 'console.log(JSON.parse(Buffer.from(process.argv[1].split(".")[1],"base64url")).sid)' "$login_gate")

          me_code=$(curl -sS -o "$RUNNER_TEMP/me-response.json" -w "%{http_code}" --max-time 30 \
            -H "authorization: Bearer $login_token" "$api/api/community/me")
          test "$me_code" = "200"
          node - <<'NODE' "$RUNNER_TEMP/me-response.json" "$uid"
          const d=require(process.argv[2]);
          if (!d.profile || d.profile.id !== process.argv[3] || d.profile.role !== 'reader') throw new Error('profile read failed');
          NODE

          # Xóa sạch tài khoản và mọi phiên E2E ngay trong cùng job.
          cleanup_best_effort
          trap - EXIT
          login_key=$(encode_key "community-login:$username")
          deleted_code=$(curl -sS -o "$RUNNER_TEMP/deleted-check.json" -w "%{http_code}" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/storage/kv/namespaces/$KV_NAMESPACE_ID/values/$login_key")
          test "$deleted_code" = "404"
          echo "register_code=$register_code" >> "$GITHUB_OUTPUT"
          echo "login_code=$login_code" >> "$GITHUB_OUTPUT"
          echo "me_code=$me_code" >> "$GITHUB_OUTPUT"
          echo "cleanup_code=$deleted_code" >> "$GITHUB_OUTPUT"
          echo "E2E Reader production PASS: tạo thật, đăng nhập thiết bị thứ hai, đọc hồ sơ và xóa sạch."

      - name: Ghi trạng thái triển khai thành công
        if: success()
        run: |
          set -euo pipefail
          git reset --hard HEAD
          rm -rf _site
          mkdir -p docs/handover
          completed_utc=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > docs/handover/PRODUCTION_STATUS.md <<EOF
          # Trạng thái production

          - Trạng thái: \`SUCCESS\`
          - Source commit: \`$GITHUB_SHA\`
          - Hoàn tất UTC: \`$completed_utc\`
          - Workflow run: \`https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\`
          - Cloudflare Pages: \`${{ steps.smoke.outputs.page_code }}\`
          - URL cuối sau chuyển hướng: \`${{ steps.smoke.outputs.page_url }}\`
          - Trang Admin: \`${{ steps.smoke.outputs.admin_page_code }}\`
          - Community CSS: \`${{ steps.smoke.outputs.css_code }}\`
          - Gate runtime JS: \`${{ steps.smoke.outputs.gate_code }}\`
          - Cloudflare Worker: \`${{ steps.smoke.outputs.worker_code }} unauthorized\` khi gọi API Reader không có phiên
          - API thảo luận: \`${{ steps.smoke.outputs.posts_code }} unauthorized\` khi không có phiên
          - Onboarding công khai: \`${{ steps.smoke.outputs.entry_code }} invalid_account\` với dữ liệu kiểm thử không hợp lệ
          - Reader E2E production: \`${{ steps.e2e_reader.outcome }}\`; register/login/me/cleanup \`${{ steps.e2e_reader.outputs.register_code || 'n/a' }}/${{ steps.e2e_reader.outputs.login_code || 'n/a' }}/${{ steps.e2e_reader.outputs.me_code || 'n/a' }}/${{ steps.e2e_reader.outputs.cleanup_code || 'n/a' }}\`
          - Account V3: plaintext public entry không cần DECRYPT_KEY; badge và bottom navigation Admin mở khu quản trị
          - Thứ tự triển khai: Pages trước, Worker sau
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/handover/PRODUCTION_STATUS.md
          git commit -m "docs: record successful production deployment" || exit 0
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Ghi trạng thái triển khai thất bại
        if: failure()
        run: |
          git reset --hard HEAD
          rm -rf _site
          mkdir -p docs/handover
          completed_utc=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > docs/handover/PRODUCTION_STATUS.md <<EOF
          # Trạng thái production

          - Trạng thái: \`FAILED\`
          - Source commit: \`$GITHUB_SHA\`
          - Ghi nhận UTC: \`$completed_utc\`
          - Workflow run: \`https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\`
          - Preflight: \`${{ steps.preflight.outcome }}\`
          - Tích hợp runtime: \`${{ steps.integrate.outcome }}\`
          - Test source: \`${{ steps.test_source.outcome }}\`
          - Test Worker: \`${{ steps.test_worker.outcome }}\`
          - Build site: \`${{ steps.build.outcome }}\`
          - Deploy Pages: \`${{ steps.deploy_pages.outcome }}\`
          - Deploy Worker: \`${{ steps.deploy_worker.outcome }}\`
          - Hậu kiểm: \`${{ steps.smoke.outcome }}\`
          - Reader E2E production: \`${{ steps.e2e_reader.outcome }}\`
          - HTTP Pages/Admin/CSS/Gate/Worker/Posts/Onboarding: \`${{ steps.smoke.outputs.page_code || 'n/a' }}/${{ steps.smoke.outputs.admin_page_code || 'n/a' }}/${{ steps.smoke.outputs.css_code || 'n/a' }}/${{ steps.smoke.outputs.gate_code || 'n/a' }}/${{ steps.smoke.outputs.worker_code || 'n/a' }}/${{ steps.smoke.outputs.posts_code || 'n/a' }}/${{ steps.smoke.outputs.entry_code || 'n/a' }}\`
          - URL cuối sau chuyển hướng: \`${{ steps.smoke.outputs.page_url || 'n/a' }}\`
          - Hành động: mở workflow run ở trên, sửa đúng bước thất bại rồi chạy lại; không coi production đã hoàn tất.
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/handover/PRODUCTION_STATUS.md
          git commit -m "docs: record failed production deployment" || exit 0
          git pull --rebase origin main
          git push origin HEAD:main
