name: Deploy lên Cloudflare Pages (hiennhi89.pages.dev)

on:
  push:
    branches: [main]
    paths-ignore:
      - HANDOVER.md
      - docs/handover/**
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: "997944c1bfcc2dcaca32718124cd718c"
    steps:
      - name: Checkout repo chính
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with: { node-version: "22" }

      - name: Kiểm tra secret deploy
        id: preflight
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "::error::Thiếu CLOUDFLARE_API_TOKEN"; exit 1; }
          npx --yes wrangler@4.112.0 secret list --config backend/wrangler.toml --format json > "$RUNNER_TEMP/worker-secrets.json"
          node -e "const s=require(process.argv[1]); if (!s.some(({name}) => name === 'DECRYPT_KEY_SPARE')) { console.error('::error::Worker thiếu DECRYPT_KEY_SPARE'); process.exit(1); }" "$RUNNER_TEMP/worker-secrets.json"

      - name: Áp dụng hệ thống tài khoản Khách Reader Admin
        id: integrate
        run: |
          node tools/apply-role-system.mjs
          node tools/apply-account-v2-runner.mjs

      - name: Kiểm tra source
        id: test_source
        run: |
          node --check assets/gate.js
          node --check assets/community.js
          node --check assets/community-admin.js
          node assets/gate.test.mjs
          node assets/account-v2.test.mjs
          node --check sw.js
          node --check boitoan/sw.js
          node sw.test.mjs
          node boitoan/sw.test.mjs

      - name: Kiểm tra Worker
        id: test_worker
        run: |
          node --check backend/community.js
          node backend/community.test.mjs
          node backend/account-v2.test.mjs
          node --check backend/worker.js
          node backend/worker.test.mjs

      - name: Gộp site (SPARE + Bói toán + MEDORA)
        id: build
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/boitoan _site/assets _site/medora
          cp index.html manifest.webmanifest sw.js _site/
          cp assets/gate.js assets/gate.css assets/community.js assets/community-admin.js assets/community.css _site/assets/
          cp robots.txt _site/robots.txt
          cp boitoan/index.html boitoan/community.html boitoan/community-admin.html boitoan/sw.js boitoan/manifest.webmanifest boitoan/icon-192.png boitoan/icon.png _site/boitoan/
          cp medora/index.html _site/medora/index.html

      - name: Deploy lên Cloudflare Pages
        id: deploy_pages
        run: npx --yes wrangler@4.112.0 pages deploy _site --project-name hiennhi89 --branch main --commit-dirty=true

      - name: Deploy Worker sau Pages
        id: deploy_worker
        working-directory: backend
        run: npx --yes wrangler@4.112.0 deploy

      - name: Hậu kiểm production
        id: smoke
        run: |
          set -euo pipefail
          page_code=""
          page_url=""
          admin_page_code=""
          css_code=""
          gate_code=""
          worker_code=""
          posts_code=""
          entry_code=""
          cache_bust="deploy=${GITHUB_SHA}"
          for attempt in $(seq 1 30); do
            page_meta=$(curl -sSL -o "$RUNNER_TEMP/community.html" -w "%{http_code}|%{url_effective}" --max-time 20 "https://hiennhi89.pages.dev/boitoan/community.html?${cache_bust}" || true)
            page_code=${page_meta%%|*}
            page_url=${page_meta#*|}
            admin_page_code=$(curl -sSL -o "$RUNNER_TEMP/community-admin.html" -w "%{http_code}" --max-time 20 "https://hiennhi89.pages.dev/boitoan/community-admin.html?${cache_bust}" || true)
            css_code=$(curl -sSL -o "$RUNNER_TEMP/community.css" -w "%{http_code}" --max-time 20 "https://hiennhi89.pages.dev/assets/community.css?${cache_bust}" || true)
            gate_code=$(curl -sSL -o "$RUNNER_TEMP/gate.js" -w "%{http_code}" --max-time 20 "https://hiennhi89.pages.dev/assets/gate.js?${cache_bust}" || true)
            worker_code=$(curl -sS -o "$RUNNER_TEMP/community-api.json" -w "%{http_code}" --max-time 20 "https://hiennhi89-gate.hiennhi89.workers.dev/api/community/readers" || true)
            posts_code=$(curl -sS -o "$RUNNER_TEMP/community-posts.json" -w "%{http_code}" --max-time 20 "https://hiennhi89-gate.hiennhi89.workers.dev/api/community/posts" || true)
            entry_code=$(curl -sS -o "$RUNNER_TEMP/community-entry.json" -w "%{http_code}" --max-time 20 \
              -H 'content-type: application/json' \
              --data '{"entry":true,"device_id":"00000000-0000-4000-8000-000000000001","role":"guest","username":"x","password":"short","display_name":""}' \
              "https://hiennhi89-gate.hiennhi89.workers.dev/api/community/register" || true)
            if [ "$page_code" = "200" ] \
              && grep -q "Spirituality Market" "$RUNNER_TEMP/community.html" \
              && grep -q "Reader / Người xem bói" "$RUNNER_TEMP/community.html" \
              && [ "$admin_page_code" = "200" ] \
              && grep -q 'data-admin-tab="posts"' "$RUNNER_TEMP/community-admin.html" \
              && [ "$css_code" = "200" ] \
              && grep -q "Account V2 role UI" "$RUNNER_TEMP/community.css" \
              && [ "$gate_code" = "200" ] \
              && grep -q "gate-entry-choice" "$RUNNER_TEMP/gate.js" \
              && grep -q "claimPrimaryAdminDevice" "$RUNNER_TEMP/gate.js" \
              && grep -q "if (!payload)" "$RUNNER_TEMP/gate.js" \
              && [ "$worker_code" = "401" ] \
              && grep -q '"unauthorized"' "$RUNNER_TEMP/community-api.json" \
              && [ "$posts_code" = "401" ] \
              && grep -q '"unauthorized"' "$RUNNER_TEMP/community-posts.json" \
              && [ "$entry_code" = "400" ] \
              && grep -q '"invalid_account"' "$RUNNER_TEMP/community-entry.json"; then
              break
            fi
            sleep 4
          done
          {
            echo "page_code=$page_code"
            echo "page_url=$page_url"
            echo "admin_page_code=$admin_page_code"
            echo "css_code=$css_code"
            echo "gate_code=$gate_code"
            echo "worker_code=$worker_code"
            echo "posts_code=$posts_code"
            echo "entry_code=$entry_code"
          } >> "$GITHUB_OUTPUT"
          test "$page_code" = "200"
          grep -q "Spirituality Market" "$RUNNER_TEMP/community.html"
          grep -q "Reader / Người xem bói" "$RUNNER_TEMP/community.html"
          test "$admin_page_code" = "200"
          grep -q 'data-admin-tab="posts"' "$RUNNER_TEMP/community-admin.html"
          test "$css_code" = "200"
          grep -q "Account V2 role UI" "$RUNNER_TEMP/community.css"
          test "$gate_code" = "200"
          grep -q "gate-entry-choice" "$RUNNER_TEMP/gate.js"
          grep -q "claimPrimaryAdminDevice" "$RUNNER_TEMP/gate.js"
          grep -q "if (!payload)" "$RUNNER_TEMP/gate.js"
          test "$worker_code" = "401"
          grep -q '"unauthorized"' "$RUNNER_TEMP/community-api.json"
          test "$posts_code" = "401"
          grep -q '"unauthorized"' "$RUNNER_TEMP/community-posts.json"
          test "$entry_code" = "400"
          grep -q '"invalid_account"' "$RUNNER_TEMP/community-entry.json"

      - name: Ghi trạng thái triển khai thành công
        if: success()
        run: |
          set -euo pipefail
          git reset --hard HEAD
          rm -rf _site
          mkdir -p docs/handover
          completed_utc=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > docs/handover/PRODUCTION_STATUS.md <<EOF
          # Trạng thái production

          - Trạng thái: \`SUCCESS\`
          - Source commit: \`$GITHUB_SHA\`
          - Hoàn tất UTC: \`$completed_utc\`
          - Workflow run: \`https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\`
          - Cloudflare Pages: \`${{ steps.smoke.outputs.page_code }}\`
          - URL cuối sau chuyển hướng: \`${{ steps.smoke.outputs.page_url }}\`
          - Trang Admin: \`${{ steps.smoke.outputs.admin_page_code }}\`
          - Community CSS: \`${{ steps.smoke.outputs.css_code }}\`
          - Gate runtime JS: \`${{ steps.smoke.outputs.gate_code }}\`
          - Cloudflare Worker: \`${{ steps.smoke.outputs.worker_code }} unauthorized\` khi gọi API Reader không có phiên
          - API thảo luận: \`${{ steps.smoke.outputs.posts_code }} unauthorized\` khi không có phiên
          - Onboarding công khai: \`${{ steps.smoke.outputs.entry_code }} invalid_account\` với dữ liệu kiểm thử không hợp lệ
          - Account V2: onboarding hai màn hình, nhánh plaintext không ép giải mã, badge vai trò và Admin tổng
          - Thứ tự triển khai: Pages trước, Worker sau
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/handover/PRODUCTION_STATUS.md
          git commit -m "docs: record successful production deployment" || exit 0
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Ghi trạng thái triển khai thất bại
        if: failure()
        run: |
          git reset --hard HEAD
          rm -rf _site
          mkdir -p docs/handover
          completed_utc=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > docs/handover/PRODUCTION_STATUS.md <<EOF
          # Trạng thái production

          - Trạng thái: \`FAILED\`
          - Source commit: \`$GITHUB_SHA\`
          - Ghi nhận UTC: \`$completed_utc\`
          - Workflow run: \`https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\`
          - Preflight: \`${{ steps.preflight.outcome }}\`
          - Tích hợp runtime: \`${{ steps.integrate.outcome }}\`
          - Test source: \`${{ steps.test_source.outcome }}\`
          - Test Worker: \`${{ steps.test_worker.outcome }}\`
          - Build site: \`${{ steps.build.outcome }}\`
          - Deploy Pages: \`${{ steps.deploy_pages.outcome }}\`
          - Deploy Worker: \`${{ steps.deploy_worker.outcome }}\`
          - Hậu kiểm: \`${{ steps.smoke.outcome }}\`
          - HTTP Pages/Admin/CSS/Gate/Worker/Posts/Onboarding: \`${{ steps.smoke.outputs.page_code || 'n/a' }}/${{ steps.smoke.outputs.admin_page_code || 'n/a' }}/${{ steps.smoke.outputs.css_code || 'n/a' }}/${{ steps.smoke.outputs.gate_code || 'n/a' }}/${{ steps.smoke.outputs.worker_code || 'n/a' }}/${{ steps.smoke.outputs.posts_code || 'n/a' }}/${{ steps.smoke.outputs.entry_code || 'n/a' }}\`
          - URL cuối sau chuyển hướng: \`${{ steps.smoke.outputs.page_url || 'n/a' }}\`
          - Hành động: mở workflow run ở trên, sửa đúng bước thất bại rồi chạy lại; không coi production đã hoàn tất.
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/handover/PRODUCTION_STATUS.md
          git commit -m "docs: record failed production deployment" || exit 0
          git pull --rebase origin main
          git push origin HEAD:main
