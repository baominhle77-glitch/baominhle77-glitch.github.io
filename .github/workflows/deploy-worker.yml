name: Deploy Cloudflare Worker

# Khôi phục thủ công khi cần. Rollout thường dùng deploy-pages.yml để Pages hoàn tất trước Worker.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Kiểm tra secret
        id: check
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "::notice::Chưa đặt CLOUDFLARE_API_TOKEN — bỏ qua deploy worker (xem backend/README.md)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Kiểm tra Worker
        run: |
          node --check backend/worker.js
          node backend/worker.test.mjs

      - name: Deploy với Wrangler
        if: steps.check.outputs.skip != 'true'
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx --yes wrangler@4.112.0 deploy
