name: Kiểm tra onboarding và phân cấp Admin v2

on:
  pull_request:
    paths:
      - tools/apply-role-system.mjs
      - tools/apply-onboarding-admin-v2.mjs
      - assets/**
      - backend/**
      - boitoan/**
      - .github/workflows/deploy-pages.yml
      - .github/workflows/onboarding-admin-v2-check.yml
      - docs/handover/**
      - HANDOVER.md
  push:
    branches: [main]
    paths:
      - tools/apply-onboarding-admin-v2.mjs
      - assets/onboarding-admin-v2.test.mjs
      - backend/onboarding-admin-v2.test.mjs
      - .github/workflows/onboarding-admin-v2-check.yml

permissions:
  contents: read

jobs:
  onboarding-admin-v2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - name: Sinh runtime theo đúng production
        run: |
          node tools/apply-role-system.mjs
          node tools/apply-onboarding-admin-v2.mjs
      - name: Kiểm tra frontend
        run: |
          node --check assets/gate.js
          node --check assets/community.js
          node --check assets/community-admin.js
          node assets/gate.test.mjs
          node assets/onboarding-admin-v2.test.mjs
      - name: Kiểm tra Worker và quyền
        run: |
          node --check backend/community.js
          node backend/community.test.mjs
          node backend/onboarding-admin-v2.test.mjs
          node --check backend/worker.js
          node backend/worker.test.mjs
