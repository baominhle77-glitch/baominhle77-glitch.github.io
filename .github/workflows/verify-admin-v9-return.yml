name: Xác minh Bói toán V11 mã hóa

on:
  workflow_run:
    workflows: ["Deploy lên Cloudflare Pages (hiennhi89.pages.dev)"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-boitoan-v11-production
  cancel-in-progress: true

jobs:
  verify:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with: { node-version: "22" }

      - name: Kiểm tra asset production V11
        run: |
          set -euo pipefail
          bust="verify=${GITHUB_RUN_ID}"
          for attempt in $(seq 1 30); do
            curl -fsSL "https://hiennhi89.pages.dev/boitoan/?$bust" -o "$RUNNER_TEMP/index.html" || true
            curl -fsSL "https://hiennhi89.pages.dev/assets/gate.js?$bust" -o "$RUNNER_TEMP/gate.js" || true
            curl -fsSL "https://hiennhi89.pages.dev/boitoan/community-admin.html?$bust" -o "$RUNNER_TEMP/admin.html" || true
            curl -fsSL "https://hiennhi89.pages.dev/boitoan/sw.js?$bust" -o "$RUNNER_TEMP/sw.js" || true
            if grep -q 'application/gate-payload' "$RUNNER_TEMP/index.html" \
              && grep -q '/assets/gate.js?v=19' "$RUNNER_TEMP/index.html" \
              && grep -q 'Bói toán V11' "$RUNNER_TEMP/gate.js" \
              && grep -q 'openAppContent(data.key, "admin-session")' "$RUNNER_TEMP/gate.js" \
              && grep -q 'admin_return=1&v=19' "$RUNNER_TEMP/admin.html" \
              && grep -q 'boitoan-v19' "$RUNNER_TEMP/sw.js"; then
              echo "Static production V11 đạt ở lần $attempt"
              exit 0
            fi
            sleep 4
          done
          echo "Production chưa phục vụ đủ V11" >&2
          exit 1

      - name: Kiểm tra WebKit với payload AES thật
        run: |
          set -euo pipefail
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps webkit
          node --check tools/admin-v9-return-webkit-check.mjs
          node tools/admin-v9-return-webkit-check.mjs "${{ github.event.workflow_run.head_sha || github.sha }}"
