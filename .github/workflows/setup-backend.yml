name: Cài đặt Backend Lớp C (bấm 1 lần)

# Bấm "Run workflow" một lần để TỰ ĐỘNG: tạo KV, đặt bí mật, deploy Worker,
# nối Telegram webhook. Bạn KHÔNG cần gõ lệnh.
# Yêu cầu: đã thêm 6 secret repo — CLOUDFLARE_API_TOKEN, TELEGRAM_BOT_TOKEN,
#          TELEGRAM_CHAT_ID, DECRYPT_KEY, DECRYPT_KEY_SPARE, ADMIN_TOKEN.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

jobs:
  setup:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
      DECRYPT_KEY: ${{ secrets.DECRYPT_KEY }}
      DECRYPT_KEY_SPARE: ${{ secrets.DECRYPT_KEY_SPARE }}
      ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }

      - name: Kiểm tra đã có đủ secret chưa
        run: |
          miss=0
          for v in CLOUDFLARE_API_TOKEN TG_TOKEN TG_CHAT DECRYPT_KEY DECRYPT_KEY_SPARE ADMIN_TOKEN; do
            if [ -z "${!v}" ]; then echo "::error::Thiếu secret: $v"; miss=1; fi
          done
          [ "$miss" = "0" ] || { echo "Hãy thêm đủ 6 secret rồi chạy lại (xem backend/HUONG-DAN.md)."; exit 1; }

      - name: Tạo KV (nếu chưa có) + điền cấu hình
        run: |
          set -e
          TITLE="hiennhi89-gate-KV"
          LIST=$(npx --yes wrangler@4.112.0 kv namespace list 2>/dev/null || echo '[]')
          ID=$(printf '%s' "$LIST" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{try{let a=JSON.parse(s);let r=a.find(x=>(x.title||'').includes('$TITLE'));process.stdout.write(r?r.id:'')}catch(e){process.stdout.write('')}})")
          if [ -z "$ID" ]; then
            OUT=$(npx --yes wrangler@4.112.0 kv namespace create "$TITLE" 2>&1)
            echo "$OUT"
            ID=$(printf '%s' "$OUT" | grep -oiE '[0-9a-f]{32}' | head -1)
          fi
          [ -n "$ID" ] || { echo "::error::Không lấy được KV id (token có quyền Workers KV Storage:Edit không?)"; exit 1; }
          echo "Dùng KV id: $ID"
          KV_ID="$ID" node - <<'NODE'
          const fs = require('node:fs');
          const path = 'wrangler.toml';
          const source = fs.readFileSync(path, 'utf8');
          const updated = source.replace(
            /(\[\[kv_namespaces\]\][\s\S]*?\nid\s*=\s*")[^"]+(".*)/,
            `$1${process.env.KV_ID}$2`
          );
          if (updated === source && !source.includes(`id = "${process.env.KV_ID}"`)) {
            throw new Error('Không cập nhật được KV id trong wrangler.toml');
          }
          fs.writeFileSync(path, updated);
          NODE

      - name: Kiểm tra Worker
        run: |
          node --check worker.js
          node worker.test.mjs

      - name: Đặt các bí mật cho Worker
        run: |
          set -e
          gen(){ openssl rand -hex 32; }
          printf '%s' "$TG_TOKEN"    | npx --yes wrangler@4.112.0 secret put TELEGRAM_BOT_TOKEN
          printf '%s' "$TG_CHAT"     | npx --yes wrangler@4.112.0 secret put TELEGRAM_CHAT_ID
          printf '%s' "$DECRYPT_KEY" | npx --yes wrangler@4.112.0 secret put DECRYPT_KEY
          printf '%s' "$DECRYPT_KEY_SPARE" | npx --yes wrangler@4.112.0 secret put DECRYPT_KEY_SPARE
          printf '%s' "$ADMIN_TOKEN" | npx --yes wrangler@4.112.0 secret put ADMIN_TOKEN
          SS=$(gen); printf '%s' "$SS" | npx --yes wrangler@4.112.0 secret put SESSION_SECRET
          WS=$(gen); printf '%s' "$WS" | npx --yes wrangler@4.112.0 secret put TELEGRAM_WEBHOOK_SECRET
          echo "::add-mask::$WS"
          echo "WEBHOOK_SECRET=$WS" >> "$GITHUB_ENV"

      - name: Deploy Worker
        run: npx --yes wrangler@4.112.0 deploy 2>&1 | tee deploy.log

      - name: Lấy URL + nối Telegram webhook
        run: |
          set -e
          URL=$(grep -oE 'https://[a-z0-9._-]+workers\.dev' deploy.log | head -1)
          [ -n "$URL" ] || { echo "::error::Không đọc được URL Worker"; exit 1; }
          RESPONSE=$(curl --fail-with-body --silent --show-error --request POST \
            --data-urlencode "url=${URL}/telegram/webhook" \
            --data-urlencode "secret_token=${WEBHOOK_SECRET}" \
            "https://api.telegram.org/bot${TG_TOKEN}/setWebhook")
          printf '%s' "$RESPONSE" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{const r=JSON.parse(s);if(!r.ok)throw new Error(r.description||'Telegram từ chối webhook')})"
          {
            echo "## ✅ Backend đã sẵn sàng"
            echo ""
            echo "**URL Worker:** \`$URL\`  ← gửi URL này cho Claude để bật chế độ duyệt."
            echo ""
            echo "**Trang duyệt trên máy bạn:** $URL/admin"
            echo "**Mật khẩu /admin:** dùng secret repo \`ADMIN_TOKEN\`; workflow không hiển thị giá trị."
            echo ""
            echo "> Bot Telegram đã được nối. Từ giờ ai xin truy cập, bạn nhận tin nhắn kèm nút Duyệt/Từ chối."
          } >> "$GITHUB_STEP_SUMMARY"
