name: Materialize Vietnam Travel qua PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: materialize-travel-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/TRAVEL-20260723-01-source'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout đúng branch nguồn
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Kiểm tra bundle
        id: bundle
        shell: bash
        run: |
          set -euo pipefail
          if compgen -G '.travel-bundle/chunk-*' > /dev/null; then
            echo 'exists=true' >> "$GITHUB_OUTPUT"
          else
            echo 'exists=false' >> "$GITHUB_OUTPUT"
            echo 'Source đã được materialize; không còn bundle.'
          fi

      - name: Bung bundle, kiểm checksum và test
        if: steps.bundle.outputs.exists == 'true'
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE="$RUNNER_TEMP/vietnam-travel-source.tar.gz"
          STAGE="$RUNNER_TEMP/travel-stage"
          LOG="$RUNNER_TEMP/materialize-travel-pr.log"
          mkdir -p "$STAGE/repo" docs/handover

          cat .travel-bundle/chunk-* > "$RUNNER_TEMP/vietnam-travel-source.tar.gz.b64"
          base64 --decode "$RUNNER_TEMP/vietnam-travel-source.tar.gz.b64" > "$ARCHIVE"
          echo "1511d9f80024a4a495e955e88680b4400a3d20973afd530edcb509457dbcad30  $ARCHIVE" | sha256sum -c -

          tar --exclude='.git' -cf - . | tar -xf - -C "$STAGE/repo"
          tar -xzf "$ARCHIVE" -C "$STAGE/repo"

          {
            echo 'MATERIALIZE_TRAVEL_PR_SUCCESS'
            echo "source_commit=$GITHUB_SHA"
            echo "checked_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo '== Archive files =='
            tar -tzf "$ARCHIVE"
            echo
            echo '== Tests =='
            cd "$STAGE/repo"
            node --check backend/travel.js
            node --test backend/travel.test.mjs
            node --check tools/apply-travel-system.mjs
            node --check vietnam-travel/app.js
            node --check vietnam-travel/sw.js
            node --check vietnam-travel/data/seed-places.js
            node -e "JSON.parse(require('node:fs').readFileSync('vietnam-travel/manifest.webmanifest','utf8'))"
          } > "$LOG" 2>&1

          tar -xzf "$ARCHIVE" -C "$GITHUB_WORKSPACE"
          rm -rf .travel-bundle
          rm -f .github/workflows/materialize-vietnam-travel.yml
          rm -f .github/workflows/materialize-vietnam-travel-v2.yml
          cp "$LOG" docs/handover/MATERIALIZE_TRAVEL_DIAGNOSTIC.log

      - name: Commit source thật vào branch PR
        if: steps.bundle.outputs.exists == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: materialize source Vietnam Travel qua PR"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
