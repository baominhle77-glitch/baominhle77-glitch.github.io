name: Vật liệu hóa hệ thống tài khoản

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: materialize-role-system
  cancel-in-progress: false

jobs:
  materialize:
    runs-on: ubuntu-latest
    env:
      HEAD_BRANCH: ${{ github.head_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Giải nén mã nguồn
        run: |
          set -euo pipefail
          cat .role-system/part-* > "$RUNNER_TEMP/role-system.b64"
          base64 --decode "$RUNNER_TEMP/role-system.b64" > "$RUNNER_TEMP/role-system.tgz"
          tar -tzf "$RUNNER_TEMP/role-system.tgz"
          tar -xzf "$RUNNER_TEMP/role-system.tgz"
      - name: Tạo commit sạch
        run: |
          set -euo pipefail
          rm -rf .role-system .github/workflows/materialize-role-system.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add Guest Reader Admin community system"
          git push origin HEAD:"$HEAD_BRANCH"
