name: Chẩn đoán kiểm thử hệ thống tài khoản

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  diagnose-tests:
    runs-on: ubuntu-latest
    env:
      HEAD_BRANCH: ${{ github.head_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Giải nén mã nguồn
        run: |
          cat .role-system/part-* > "$RUNNER_TEMP/role-system.b64"
          base64 --decode "$RUNNER_TEMP/role-system.b64" > "$RUNNER_TEMP/role-system.tgz"
          tar -xzf "$RUNNER_TEMP/role-system.tgz"
      - name: Ghi kết quả từng kiểm thử
        run: |
          set +e
          : > role-test-diagnostic.txt
          run_test() {
            echo "### $*" >> role-test-diagnostic.txt
            "$@" >> role-test-diagnostic.txt 2>&1
            code=$?
            echo "status=$code" >> role-test-diagnostic.txt
            echo >> role-test-diagnostic.txt
          }
          run_test node tools/apply-role-system.mjs
          run_test node --check assets/gate.js
          run_test node --check assets/community.js
          run_test node --check assets/community-admin.js
          run_test node assets/gate.test.mjs
          run_test node --check boitoan/sw.js
          run_test node boitoan/sw.test.mjs
          run_test node --check backend/community.js
          run_test node backend/community.test.mjs
          run_test node --check backend/worker.js
          run_test node backend/worker.test.mjs
          cat role-test-diagnostic.txt
      - name: Lưu chẩn đoán
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add role-test-diagnostic.txt
          git commit -m "chore: record role test diagnostics" || exit 0
          git push origin HEAD:"$HEAD_BRANCH"
