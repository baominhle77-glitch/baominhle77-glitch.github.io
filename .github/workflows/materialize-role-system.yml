name: Chẩn đoán gói hệ thống tài khoản

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      HEAD_BRANCH: ${{ github.head_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          show-progress: false
      - name: Ghi chẩn đoán gói
        run: |
          set +e
          : > role-system-diagnostic.txt
          wc -c .role-system/part-* >> role-system-diagnostic.txt
          sha256sum .role-system/part-* >> role-system-diagnostic.txt
          cat .role-system/part-* > "$RUNNER_TEMP/role-system.b64"
          echo "combined $(wc -c < "$RUNNER_TEMP/role-system.b64")" >> role-system-diagnostic.txt
          base64 --decode "$RUNNER_TEMP/role-system.b64" > "$RUNNER_TEMP/role-system.tgz"
          echo "base64_status $?" >> role-system-diagnostic.txt
          echo "tgz_size $(wc -c < "$RUNNER_TEMP/role-system.tgz")" >> role-system-diagnostic.txt
          gzip -t "$RUNNER_TEMP/role-system.tgz"
          echo "gzip_status $?" >> role-system-diagnostic.txt
          tar -tzf "$RUNNER_TEMP/role-system.tgz" >> role-system-diagnostic.txt 2>&1
          echo "tar_status $?" >> role-system-diagnostic.txt
          cat role-system-diagnostic.txt
      - name: Lưu chẩn đoán
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add role-system-diagnostic.txt
          git commit -m "chore: record role bundle diagnostics" || exit 0
          git push origin HEAD:"$HEAD_BRANCH"
