name: Materialize Vietnam Travel source

on:
  push:
    branches:
      - main
      - agent/TRAVEL-20260723-01-telegram-webapp
    paths:
      - ".travel-bundle/**"
      - ".github/workflows/materialize-vietnam-travel.yml"
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout nhánh nguồn
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Ghép và kiểm tra gói nguồn
        run: |
          set -euo pipefail
          cat .travel-bundle/chunk-* > "$RUNNER_TEMP/source.tar.gz.b64"
          base64 --decode "$RUNNER_TEMP/source.tar.gz.b64" > "$RUNNER_TEMP/source.tar.gz"
          echo "1511d9f80024a4a495e955e88680b4400a3d20973afd530edcb509457dbcad30  $RUNNER_TEMP/source.tar.gz" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/source.tar.gz" -C .
          rm -rf .travel-bundle
          rm -f .github/workflows/materialize-vietnam-travel.yml

      - name: Kiểm tra nguồn trước khi commit
        run: |
          set -euo pipefail
          node --check backend/travel.js
          node --test backend/travel.test.mjs
          node --check tools/apply-travel-system.mjs
          node --check vietnam-travel/app.js
          node --check vietnam-travel/sw.js
          node --check vietnam-travel/data/seed-places.js
          node -e "JSON.parse(require('node:fs').readFileSync('vietnam-travel/manifest.webmanifest','utf8'))"

      - name: Commit source thật vào nhánh hiện tại
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: thêm app Vietnam Travel và Telegram control"
          git push origin HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}
