<title>Bói Toán — Tra cứu &amp; Thực hành</title>
<style>
  :root{
    --bg:#0d0b14; --bg2:#161226; --card:#1c1730; --card2:#241d3d;
    --ink:#e8e2f4; --ink-dim:#a89fc4; --ink-faint:#6f668f;
    --gold:#d4a94e; --gold-soft:#b8933f;
    --violet:#8b6fd0; --line:#332a52;
    --ok:#5fbf8a; --mid:#d4a94e; --warn:#e0785a;
    --radius:14px;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{
    font-family:Georgia,'Times New Roman',serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, #241d3d55, transparent),
      radial-gradient(900px 500px at -10% 30%, #1c173055, transparent),
      var(--bg);
    color:var(--ink); line-height:1.6; min-height:100vh;
    padding-top:var(--safe-top);
    padding-bottom:calc(84px + var(--safe-bottom));
    -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
  }
  .wrap{max-width:640px;margin:0 auto;padding:0 14px}

  header{padding:22px 0 8px;text-align:center}
  h1{font-size:1.32rem;letter-spacing:.13em;color:var(--gold);font-weight:normal;text-transform:uppercase}
  .sub{color:var(--ink-dim);font-size:.85rem;margin-top:4px;font-style:italic}

  /* ---- screens ---- */
  .screen{display:none;animation:fadein .25s ease}
  .screen.active{display:block}
  @keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* ---- home grid ---- */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  .tile{
    background:linear-gradient(160deg,var(--card),var(--card2));
    border:1px solid var(--line);border-radius:var(--radius);
    padding:18px 14px;text-align:center;cursor:pointer;
    transition:transform .12s ease,border-color .12s ease;
  }
  .tile:active{transform:scale(.97);border-color:var(--gold)}
  .tile .em{font-size:1.9rem;display:block;margin-bottom:6px}
  .tile .t{color:var(--gold);font-size:1rem;letter-spacing:.04em}
  .tile .d{color:var(--ink-faint);font-size:.75rem;margin-top:3px;line-height:1.35}

  /* ---- today card on home ---- */
  .today{
    background:linear-gradient(160deg,var(--card),var(--card2));
    border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;margin-top:16px;
  }
  .today h3{color:var(--gold);font-size:.95rem;letter-spacing:.08em;font-weight:normal;margin-bottom:8px}
  .today .row{display:flex;justify-content:space-between;gap:8px;font-size:.9rem;padding:3px 0;border-bottom:1px dashed #332a5266}
  .today .row:last-child{border-bottom:none}
  .today .k{color:var(--ink-dim)}
  .today .v{color:var(--ink);text-align:right}

  /* ---- section head with back ---- */
  .shead{display:flex;align-items:center;gap:10px;padding:14px 0 8px;position:sticky;top:var(--safe-top);background:var(--bg);z-index:5}
  .back{
    border:1px solid var(--line);background:var(--bg2);color:var(--gold);
    border-radius:10px;padding:7px 13px;font-size:.9rem;cursor:pointer;font-family:inherit;
  }
  .shead h2{font-size:1.08rem;color:var(--gold);font-weight:normal;letter-spacing:.06em}

  /* ---- panels/forms ---- */
  .panel{
    background:linear-gradient(160deg,var(--card),var(--card2));
    border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;margin:10px 0;
  }
  .panel h3{color:var(--gold);font-weight:normal;font-size:.98rem;margin-bottom:10px;letter-spacing:.05em}
  label{display:block;color:var(--ink-dim);font-size:.82rem;margin:10px 0 4px}
  input,select,textarea{
    width:100%;padding:11px 12px;border-radius:10px;border:1px solid var(--line);
    background:var(--bg2);color:var(--ink);font-size:16px;font-family:inherit;outline:none;
    -webkit-appearance:none;appearance:none;
  }
  input:focus,select:focus,textarea:focus{border-color:var(--violet)}
  .btn{
    display:inline-block;width:100%;margin-top:14px;padding:13px;border-radius:12px;
    border:1px solid var(--gold-soft);
    background:linear-gradient(160deg,#3a2f1a,#2a2213);
    color:var(--gold);font-size:1rem;font-family:inherit;cursor:pointer;
    letter-spacing:.06em;transition:transform .1s ease;
  }
  .btn:active{transform:scale(.98)}
  .btn.ghost{background:var(--bg2);border-color:var(--line);color:var(--ink-dim);font-size:.9rem;padding:10px}
  .btnrow{display:flex;gap:8px}
  .btnrow .btn{margin-top:10px}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0}
  .chip{
    border:1px solid var(--line);border-radius:20px;padding:6px 14px;font-size:.85rem;
    color:var(--ink-dim);cursor:pointer;background:var(--bg2);font-family:inherit;
  }
  .chip.on{border-color:var(--gold);color:var(--gold);background:#d4a94e14}

  /* ---- results ---- */
  .result{margin-top:6px}
  .cardrow{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:12px 0}
  .tcard{
    width:92px;min-height:140px;border-radius:10px;border:1px solid var(--gold-soft);
    background:linear-gradient(160deg,#241d3d,#161226);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:8px 5px;position:relative;
    animation:flip .5s ease;
  }
  @keyframes flip{from{transform:rotateY(90deg);opacity:0}to{transform:none;opacity:1}}
  .tcard .glyph{font-size:1.7rem;margin-bottom:6px}
  .tcard .nm{font-size:.68rem;color:var(--gold);line-height:1.25}
  .tcard .pos{position:absolute;top:-8px;left:50%;transform:translateX(-50%);
    background:var(--violet);color:#fff;font-size:.6rem;border-radius:8px;padding:1px 8px;white-space:nowrap}
  .tcard.rev{border-color:var(--warn)}
  .tcard.rev .glyph{transform:rotate(180deg)}
  .tcard .rv{font-size:.6rem;color:var(--warn)}
  .meaning{border-left:2px solid var(--gold-soft);padding:8px 12px;margin:10px 0;background:#d4a94e0a;border-radius:0 8px 8px 0}
  .meaning .mt{color:var(--gold);font-size:.9rem}
  .meaning .mp{color:var(--ink-dim);font-size:.75rem;font-style:italic}
  .meaning .mb{font-size:.88rem;margin-top:4px}
  .note{color:var(--ink-faint);font-size:.78rem;font-style:italic;margin-top:8px;line-height:1.5}

  /* ---- iching ---- */
  .hexbig{font-size:4.2rem;text-align:center;line-height:1.1;color:var(--gold)}
  .hexname{text-align:center;color:var(--gold);font-size:1.05rem;margin-top:2px}
  .hexsub{text-align:center;color:var(--ink-faint);font-size:.8rem}
  .lines{display:flex;flex-direction:column-reverse;gap:6px;width:150px;margin:14px auto}
  .hline{height:12px;display:flex;gap:10px;justify-content:center;position:relative}
  .hline .bar{flex:1;background:var(--gold);border-radius:3px}
  .hline.moving .bar{background:var(--warn)}
  .hline .gap{width:26px}
  .hline .mark{position:absolute;right:-22px;top:-2px;color:var(--warn);font-size:.75rem}
  .coins{display:flex;gap:14px;justify-content:center;margin:10px 0;font-size:1.8rem;min-height:2.2rem}

  /* ---- tuvi chart ---- */
  .tvgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin:12px 0}
  .tvcell{
    background:var(--bg2);border:1px solid var(--line);border-radius:8px;
    min-height:104px;padding:5px 5px;font-size:.62rem;line-height:1.3;position:relative;
  }
  .tvcell .chi{color:var(--ink-faint);font-size:.58rem;position:absolute;bottom:3px;right:5px}
  .tvcell .cung{color:var(--violet);font-size:.62rem;letter-spacing:.02em}
  .tvcell .cung.menh{color:var(--gold)}
  .tvcell .maj{color:var(--gold);font-size:.66rem}
  .tvcell .min{color:var(--ink-dim)}
  .tvcell .hoa{color:var(--warn)}
  .tvcell .van{color:var(--ink-faint);font-size:.56rem}
  .tvcenter{
    grid-column:2/4;grid-row:2/4;background:linear-gradient(160deg,var(--card),var(--card2));
    border:1px solid var(--gold-soft);border-radius:8px;padding:8px;font-size:.72rem;line-height:1.5;
    display:flex;flex-direction:column;justify-content:center;text-align:center;
  }
  .tvcenter .nm{color:var(--gold);font-size:.85rem}

  /* ---- tables in browse ---- */
  .list{margin-top:6px}
  .litem{
    display:flex;gap:12px;align-items:flex-start;padding:10px 4px;
    border-bottom:1px solid #332a5255;font-size:.88rem;
  }
  .litem .lg{font-size:1.3rem;width:34px;text-align:center;flex-shrink:0;color:var(--gold)}
  .litem .ln{color:var(--gold);font-size:.85rem}
  .litem .lm{color:var(--ink-dim);font-size:.8rem;margin-top:2px}
  .searchbox{margin:10px 0 4px;position:relative}
  .searchbox input{padding-right:40px}
  .searchbox .icon{position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--ink-faint)}

  /* ---- history ---- */
  .hitem{padding:10px 4px;border-bottom:1px solid #332a5255;font-size:.85rem}
  .hitem .hd{color:var(--ink-faint);font-size:.72rem}
  .hitem .hq{color:var(--ink-dim);font-style:italic}

  /* ---- bottom nav ---- */
  nav{
    position:fixed;bottom:0;left:0;right:0;z-index:20;
    background:#13101fee;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border-top:1px solid var(--line);
    padding:8px 6px calc(8px + var(--safe-bottom));
    display:flex;justify-content:space-around;
  }
  nav button{
    background:none;border:none;color:var(--ink-faint);font-family:inherit;
    font-size:.68rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;
    padding:2px 10px;
  }
  nav button .i{font-size:1.25rem}
  nav button.on{color:var(--gold)}

  .tag{display:inline-block;border:1px solid var(--line);border-radius:14px;padding:1px 10px;font-size:.7rem;color:var(--ink-dim);margin:2px 2px 2px 0}
  .tag.good{border-color:var(--ok);color:var(--ok)}
  .tag.bad{border-color:var(--warn);color:var(--warn)}
  .divider{border:none;border-top:1px dashed var(--line);margin:12px 0}
  .big-day{font-size:1.5rem;color:var(--gold);text-align:center}
  .kv{display:flex;justify-content:space-between;gap:10px;padding:5px 0;border-bottom:1px dashed #332a5266;font-size:.88rem}
  .kv:last-child{border-bottom:none}
  .kv .k{color:var(--ink-dim);flex-shrink:0}
  .kv .v{text-align:right}
  .center{text-align:center}
  .goldtxt{color:var(--gold)}
  .warntxt{color:var(--warn)}
  .oktxt{color:var(--ok)}

  /* ---- lịch âm dương ---- */
  .calhead{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:10px 0}
  .calhead button{border:1px solid var(--line);background:var(--bg2);color:var(--gold);border-radius:10px;padding:8px 16px;font-size:1rem;cursor:pointer;font-family:inherit}
  .calhead .cm{color:var(--gold);font-size:1.02rem;letter-spacing:.04em;text-align:center}
  .calhead .cm small{display:block;color:var(--ink-faint);font-size:.72rem;letter-spacing:.02em}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .calgrid .wd{text-align:center;color:var(--ink-faint);font-size:.7rem;padding:4px 0}
  .calcell{
    background:var(--bg2);border:1px solid var(--line);border-radius:8px;
    min-height:52px;padding:3px 2px;text-align:center;cursor:pointer;position:relative;
  }
  .calcell.empty{background:none;border:none;cursor:default}
  .calcell .sd{font-size:.95rem;color:var(--ink)}
  .calcell .ld{font-size:.62rem;color:var(--ink-faint)}
  .calcell.hd{border-color:var(--gold-soft)}
  .calcell.hd .sd{color:var(--gold)}
  .calcell.today{background:#d4a94e1e;border-color:var(--gold)}
  .calcell .bad{position:absolute;top:2px;right:4px;color:var(--warn);font-size:.6rem}
  .callegend{display:flex;gap:14px;justify-content:center;margin:8px 0;color:var(--ink-faint);font-size:.72rem;flex-wrap:wrap}
  .hrtable{width:100%;border-collapse:collapse;font-size:.76rem;overflow-x:auto}
  .hrtable th{color:var(--ink-faint);font-weight:normal;text-align:left;padding:4px 6px;border-bottom:1px solid var(--line);font-size:.7rem}
  .hrtable td{padding:4px 6px;border-bottom:1px dashed #332a5255}
  .hrtable .g{color:var(--ok)}
  .hrtable .b{color:var(--warn)}

  /* ---- bát tự ---- */
  .pillars{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px 0}
  .pillars.pal3{grid-template-columns:repeat(3,1fr)}
  .pillar{background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:8px 4px;text-align:center;font-size:.68rem}
  .pillar .pt{color:var(--ink-faint);font-size:.62rem;margin-bottom:3px}
  .pillar .pc{color:var(--gold);font-size:.92rem;line-height:1.3}
  .pillar .pn{color:var(--ink-dim);font-size:.6rem;margin-top:3px}
  .pillar .ps{color:var(--violet);font-size:.62rem;margin-top:3px}
  .nhrow{display:flex;align-items:center;gap:8px;font-size:.8rem;margin:4px 0}
  .nhrow .lb{width:44px;color:var(--ink-dim);flex-shrink:0}
  .nhrow .track{flex:1;background:var(--bg2);border-radius:5px;height:12px;overflow:hidden}
  .nhrow .fill{height:100%;border-radius:5px}
  .nhrow .ct{width:20px;text-align:right;color:var(--ink-dim)}
  .numbig{text-align:center;font-size:2.6rem;color:var(--gold);line-height:1.2}
  .answer{border:1px solid var(--gold-soft);background:#d4a94e10;border-radius:var(--radius);padding:14px 16px;margin:10px 0}
  .answer h3{color:var(--gold);font-weight:normal;font-size:.98rem;margin-bottom:8px;letter-spacing:.05em}
  .answer p{font-size:.92rem;margin-bottom:8px}
  .answer p:last-child{margin-bottom:0}
  .profSel{margin-bottom:2px}
</style>
