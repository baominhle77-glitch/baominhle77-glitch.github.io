<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="theme-color" content="#0d0a16">
  <title>Cái Chợ của Hiên Nhi · Cộng đồng luận giải</title>
  <link rel="stylesheet" href="/assets/community.css">
</head>
<body>
  <div class="community-watermark" aria-hidden="true">
    <span>Cái Chợ của Hiên Nhi</span><span>Cái Chợ của Hiên Nhi</span><span>Cái Chợ của Hiên Nhi</span>
    <span>Cái Chợ của Hiên Nhi</span><span>Cái Chợ của Hiên Nhi</span><span>Cái Chợ của Hiên Nhi</span>
  </div>

  <header class="community-topbar">
    <a class="community-back" href="./" aria-label="Quay lại Bói toán">← <span>Bói toán</span></a>
    <div class="community-brand">
      <span class="community-brand-mark" aria-hidden="true">◈</span>
      <div>
        <strong>Cái Chợ của Hiên Nhi</strong>
        <small>Cộng đồng luận giải</small>
      </div>
    </div>
    <button id="community-account-button" class="community-icon-button" type="button" hidden>Tài khoản</button>
  </header>

  <main id="community-app" class="community-shell" aria-live="polite">
    <section class="community-card community-loading">
      <h1>Đang mở cộng đồng…</h1>
      <p>Hệ thống đang kiểm tra phiên truy cập.</p>
    </section>
  </main>

  <template id="community-auth-template">
    <section class="community-auth-layout">
      <div class="community-card community-login-card">
        <h1>Đăng nhập</h1>
        <form id="community-login-form" class="community-form">
          <label>Tên đăng nhập<input name="username" required minlength="3" maxlength="30" autocomplete="username"></label>
          <label>Mật khẩu<input name="password" type="password" required minlength="8" maxlength="128" autocomplete="current-password"></label>
          <button class="community-primary" type="submit">Đăng nhập</button>
          <p class="community-state" role="status"></p>
        </form>
      </div>

      <div class="community-card community-register-card">
        <div class="community-section-heading">
          <span class="community-brand-mark small" aria-hidden="true">◈</span>
          <div>
            <h1>Tạo tài khoản</h1>
            <p>Chọn đúng vai trò để hệ thống chỉ hiện các mục cần thiết.</p>
          </div>
        </div>
        <form id="community-register-form" class="community-form">
          <fieldset class="community-role-choice">
            <legend>Loại tài khoản</legend>
            <label class="community-role-card">
              <input type="radio" name="role" value="guest" checked>
              <span class="community-role-dot" aria-hidden="true"></span>
              <span class="community-role-copy">
                <strong>Khách</strong>
                <small>Tạo hồ sơ cá nhân và trò chuyện với Reader.</small>
              </span>
            </label>
            <label class="community-role-card">
              <input type="radio" name="role" value="reader">
              <span class="community-role-dot" aria-hidden="true"></span>
              <span class="community-role-copy">
                <strong>Reader / Người luận giải</strong>
                <small>Thêm chuyên môn, thông tin nhận phí, đánh giá và lịch sử tư vấn.</small>
              </span>
            </label>
          </fieldset>
          <label>Tên đăng nhập<input name="username" required pattern="[a-zA-Z0-9_]{3,30}" maxlength="30" autocomplete="username" placeholder="Chữ, số hoặc dấu _"></label>
          <label>Mật khẩu<input name="password" type="password" required minlength="8" maxlength="128" autocomplete="new-password"></label>
          <label>Tên hiển thị<input name="display_name" required maxlength="80"></label>
          <label>Giới thiệu bản thân<textarea name="bio" maxlength="1000" rows="4"></textarea></label>
          <div class="community-reader-fields" hidden>
            <label>Mảng chuyên sâu<input name="specialties" maxlength="500" placeholder="Tarot, Lenormand, Kinh Dịch…"></label>
            <div class="community-grid-2">
              <label>Ngân hàng<input name="bank_name" maxlength="80"></label>
              <label>Số tài khoản<input name="account_number" maxlength="60" inputmode="numeric"></label>
            </div>
            <label>Tên chủ tài khoản<input name="account_name" maxlength="100"></label>
            <label>QR nhận tiền<input name="qr_file" type="file" accept="image/png,image/jpeg,image/webp"></label>
            <small>Hồ sơ Reader không chấp nhận đường dẫn dưới bất kỳ dạng văn bản nào.</small>
          </div>
          <button class="community-primary" type="submit">Tạo tài khoản</button>
          <p class="community-state" role="status"></p>
        </form>
      </div>
    </section>
  </template>

  <script>
    window.COMMUNITY_BACKEND = "https://hiennhi89-gate.hiennhi89.workers.dev";
  </script>
  <script src="/assets/community.js" defer></script>
</body>
</html>
