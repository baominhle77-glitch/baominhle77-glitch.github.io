<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>Quản trị cộng đồng luận giải</title>
  <link rel="stylesheet" href="/assets/community.css">
</head>
<body>
  <header class="community-topbar">
    <a class="community-back" href="./">← Bói toán</a>
    <div><strong>Quản trị cộng đồng</strong><small>Khách · Reader · đánh giá · hội thoại</small></div>
  </header>
  <main class="community-shell">
    <section class="community-card">
      <h1>Đăng nhập quản trị</h1>
      <form id="community-admin-login" class="community-form community-admin-login">
        <label>Mật khẩu Admin<input id="community-admin-token" type="password" autocomplete="current-password" required></label>
        <button class="community-primary" type="submit">Tải dữ liệu</button>
      </form>
      <p id="community-admin-state" class="community-state" role="status"></p>
      <div class="community-owner-device">
        <div><strong>Thiết bị chủ</strong><small id="community-owner-device-id"></small></div>
        <button id="community-bind-owner" type="button" class="community-secondary">Khóa thiết bị chủ này</button>
      </div>
    </section>

    <nav class="community-tabs" aria-label="Quản trị">
      <button type="button" data-admin-tab="users" class="active">Tài khoản</button>
      <button type="button" data-admin-tab="reviews">Đánh giá</button>
      <button type="button" data-admin-tab="conversations">Hội thoại riêng</button>
    </nav>

    <section id="community-admin-content" class="community-card">
      <p>Nhập mật khẩu Admin để tải dữ liệu.</p>
    </section>
  </main>
  <script>
    window.COMMUNITY_BACKEND = "https://hiennhi89-gate.hiennhi89.workers.dev";
  </script>
  <script src="/assets/community-admin.js" defer></script>
</body>
</html>
