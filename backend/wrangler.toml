# wrangler.toml — cấu hình Cloudflare Worker "cổng duyệt truy cập"
name = "hiennhi89-gate"
main = "worker.js"
compatibility_date = "2025-01-01"

[vars]
# Domain web của bạn (CORS). Sửa nếu đổi tên tài khoản.
ALLOWED_ORIGINS = "https://baominhle77-glitch.github.io"
# Chat ID Telegram của bạn (workflow tự điền).
TELEGRAM_CHAT_ID = "PUT_YOUR_CHAT_ID"

# Bộ nhớ KV để lưu yêu cầu + nhật ký (workflow tự tạo & điền id).
[[kv_namespaces]]
binding = "KV"
id = "PUT_KV_NAMESPACE_ID"

# Bí mật (KHÔNG ghi ở đây) — workflow tự đặt:
#   TELEGRAM_BOT_TOKEN, TELEGRAM_WEBHOOK_SECRET, ADMIN_TOKEN, SESSION_SECRET, DECRYPT_KEY
