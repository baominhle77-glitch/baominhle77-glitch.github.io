# wrangler.toml — cấu hình Cloudflare Worker "cổng duyệt truy cập"
name = "hiennhi89-gate"
main = "worker.js"
compatibility_date = "2025-01-01"

[vars]
# Domain web của bạn (CORS). Sửa nếu đổi tên tài khoản.
ALLOWED_ORIGINS = "https://baominhle77-glitch.github.io,https://hiennhi89.github.io,https://hiennhi89.pages.dev"
# Bật sau khi đã đặt webhook/bot secret và chấp nhận Telegram giữ bản sao tin nhắn.
CHAT_ENABLED = "false"

# Bộ nhớ KV để lưu yêu cầu + nhật ký (workflow tự tạo & điền id).
[[kv_namespaces]]
binding = "KV"
id = "1030b053db194312be8adbfc24e73a85"

# Chống spam best-effort theo từng Cloudflare location, không phải ranh giới bảo mật.
[[ratelimits]]
name = "PUBLIC_RATE_LIMITER"
namespace_id = "89001"
	[ratelimits.simple]
	limit = 10
	period = 60

[[ratelimits]]
name = "CHAT_RATE_LIMITER"
namespace_id = "89002"
	[ratelimits.simple]
	limit = 12
	period = 60

# Bí mật (KHÔNG ghi ở đây) — workflow setup hoặc Wrangler đặt:
#   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID, TELEGRAM_WEBHOOK_SECRET,
#   ADMIN_TOKEN, SESSION_SECRET, DECRYPT_KEY
